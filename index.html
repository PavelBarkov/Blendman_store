<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blender Store — магазин ассетов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #07090f;
            color: #f0f3fa;
            padding-bottom: 80px;
            overflow-x: hidden;
        }
        :root {
            --accent-primary: #ff7a2f;
            --accent-secondary: #2b6c9e;
            --accent-glow: rgba(255, 122, 47, 0.4);
            --bg-surface: rgba(18, 22, 35, 0.75);
            --bg-elevated: #131724;
            --border-light: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(16px);
            --card-radius: 28px;
            --transition-smooth: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #1a1e2a; }
        ::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 8px; }

        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(7, 9, 15, 0.8);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-light);
            padding: 12px 20px;
        }
        .header-content {
            max-width: 1400px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .logo:hover {
            opacity: 0.85;
        }
        .logo-img {
            height: 44px;
            width: auto;
            border-radius: 14px;
            background: rgba(255,255,255,0.05);
            padding: 4px;
            object-fit: contain;
        }
        .logo-text {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff7a2f, #3b8fc2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .cart-btn {
            background: var(--bg-surface); backdrop-filter: blur(8px);
            border: 1px solid var(--border-light); border-radius: 60px;
            padding: 8px 20px; font-weight: 600;
            display: flex; align-items: center; gap: 10px; cursor: pointer;
            transition: 0.2s;
        }
        .cart-btn:hover {
            border-color: var(--accent-primary);
            background: rgba(255,122,47,0.1);
        }
        .cart-count {
            background: var(--accent-primary); border-radius: 40px;
            padding: 2px 10px; font-size: 14px; font-weight: 700;
            box-shadow: 0 0 8px var(--accent-glow);
        }
        .search-container { max-width: 1400px; margin: 20px auto 0; padding: 0 20px; }
        .search-input {
            width: 100%; padding: 14px 24px; background: var(--bg-surface);
            backdrop-filter: blur(8px); border: 1px solid var(--border-light);
            border-radius: 60px; color: white; font-size: 16px;
        }
        .search-input:focus { border-color: var(--accent-primary); outline: none; box-shadow: 0 0 0 2px rgba(255,122,47,0.2); }
        .categories {
            max-width: 1400px; margin: 20px auto 0; padding: 0 20px;
            display: flex; gap: 12px; overflow-x: auto;
        }
        .chip {
            background: var(--bg-surface); backdrop-filter: blur(4px);
            border: 1px solid var(--border-light); padding: 8px 20px;
            border-radius: 40px; font-size: 14px; font-weight: 500;
            cursor: pointer; white-space: nowrap;
            transition: 0.2s;
        }
        .chip.active { background: var(--accent-primary); color: #0a0c15; border-color: var(--accent-primary); box-shadow: 0 6px 14px rgba(255,122,47,0.3); }
        .products-grid { max-width: 1400px; margin: 32px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 28px; }
        .product-card {
            background: var(--bg-surface); backdrop-filter: blur(8px);
            border: 1px solid var(--border-light); border-radius: var(--card-radius);
            padding: 20px; transition: var(--transition-smooth); cursor: pointer;
            display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-6px); border-color: var(--accent-primary); }
        .product-preview {
            width: 100%; aspect-ratio: 1 / 1; object-fit: cover;
            border-radius: 20px; background: #0c0f18; margin-bottom: 16px;
            border: 1px solid var(--border-light);
        }
        .product-name { font-size: 20px; font-weight: 700; margin: 8px 0 4px; }
        .current-price { color: var(--accent-primary); font-weight: 800; font-size: 22px; }
        .old-price { text-decoration: line-through; color: #8e8e9e; font-size: 14px; margin-left: 8px; }
        .add-btn {
            background: rgba(255,122,47,0.12); border: 1px solid rgba(255,122,47,0.4);
            color: var(--accent-primary); padding: 10px 0; border-radius: 60px;
            width: 100%; font-weight: 600; margin-top: 16px; cursor: pointer;
            transition: 0.2s;
        }
        .add-btn:hover { background: var(--accent-primary); color: #0a0c15; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .cart-container { max-width: 900px; margin: 0 auto; padding: 24px 20px; }
        .cart-item { background: var(--bg-surface); border-radius: 28px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-light); }
        .cart-preview { width: 48px; height: 48px; object-fit: cover; border-radius: 12px; margin-right: 12px; vertical-align: middle; }
        .remove-item { background: rgba(231,76,60,0.2); border: none; color: #ff6b5e; padding: 8px 18px; border-radius: 40px; cursor: pointer; }
        .total-block { font-size: 28px; font-weight: 800; margin: 24px 0; text-align: right; }
        .checkout-btn { background: linear-gradient(105deg, var(--accent-primary), #c2410c); border: none; padding: 16px 24px; border-radius: 60px; font-weight: 700; width: 100%; cursor: pointer; color: white; }
        .form-card { background: var(--bg-elevated); border-radius: 32px; padding: 24px; margin-top: 20px; border: 1px solid var(--border-light); }
        .form-group input { width: 100%; padding: 14px; background: #0c0f18; border: 1px solid var(--border-light); border-radius: 28px; color: white; margin-bottom: 12px; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
            z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #11141f; max-width: 650px; width: 100%;
            border-radius: 48px; padding: 24px; border: 1px solid rgba(255,122,47,0.5);
            box-shadow: 0 30px 40px rgba(0,0,0,0.5);
            position: relative;
        }
        .gallery {
            display: flex;
            overflow-x: auto;
            gap: 16px;
            scroll-snap-type: x mandatory;
            border-radius: 28px;
            margin-bottom: 16px;
            background: #0c0f18;
            align-items: center;
            justify-content: center;
        }
        .gallery-img {
            flex: 0 0 100%;
            scroll-snap-align: start;
            max-height: 55vh;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            border-radius: 24px;
            background: #0c0f18;
            display: block;
            margin: 0 auto;
        }
        .gallery-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 12px 0;
        }
        .gallery-dot {
            width: 8px;
            height: 8px;
            background: #4a4a5a;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .gallery-dot.active {
            background: var(--accent-primary);
            width: 24px;
        }
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
        }
        .youtube-btn {
            background: rgba(255,0,0,0.15);
            border: 1px solid rgba(255,0,0,0.4);
            color: #ff3b3b;
            padding: 8px 16px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            text-decoration: none;
        }
        .youtube-btn:hover {
            background: #ff0000;
            color: white;
            border-color: #ff0000;
        }

        /* Админ-панель */
        .admin-panel {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0c15; z-index: 1100; overflow-y: auto;
            padding: 24px; display: none;
        }
        .admin-panel.active { display: block; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; border-bottom: 1px solid var(--border-light); padding-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .admin-tabs {
            display: flex;
            gap: 8px;
            background: var(--bg-elevated);
            padding: 6px;
            border-radius: 60px;
            width: fit-content;
            margin-bottom: 24px;
        }
        .admin-tab {
            padding: 8px 24px;
            border-radius: 40px;
            background: transparent;
            color: #aaa;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        .admin-tab.active {
            background: var(--accent-primary);
            color: #0a0c15;
        }
        .admin-section {
            display: none;
            animation: fadeIn 0.2s;
        }
        .admin-section.active {
            display: block;
        }
        .admin-layout { display: flex; gap: 24px; flex-wrap: wrap; }
        .categories-sidebar {
            background: var(--bg-elevated); border-radius: 32px; padding: 20px;
            width: 280px; border: 1px solid var(--border-light);
            height: fit-content;
        }
        .categories-sidebar h3 { margin-bottom: 16px; font-size: 18px; }
        .category-folder {
            background: rgba(255,255,255,0.03); border-radius: 20px;
            padding: 12px 16px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s;
            border-left: 3px solid transparent;
        }
        .category-folder.active { background: rgba(255,122,47,0.15); border-left-color: var(--accent-primary); }
        .category-folder span { font-weight: 500; }
        .delete-cat-btn { background: none; border: none; color: #ff8a7a; font-size: 18px; cursor: pointer; padding: 0 6px; }
        .add-cat-form { display: flex; gap: 8px; margin-top: 20px; }
        .add-cat-form input { flex: 1; background: #0c0f18; border: 1px solid var(--border-light); border-radius: 40px; padding: 10px 14px; color: white; }
        .right-content { flex: 1; min-width: 280px; }
        .products-in-cat {
            background: var(--bg-elevated); border-radius: 32px; padding: 20px;
            border: 1px solid var(--border-light);
        }
        .product-admin-row {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.02); border-radius: 24px;
            padding: 12px 16px; margin-bottom: 12px;
            flex-wrap: wrap; gap: 12px;
        }
        .product-admin-row:hover { background: rgba(255,122,47,0.08); }
        .product-admin-info { display: flex; align-items: center; gap: 12px; flex: 2; cursor: pointer; }
        .admin-preview {
            width: 48px; height: 48px; object-fit: cover; border-radius: 12px;
            background: #0c0f18; border: 1px solid var(--border-light);
        }
        .btn-icon { background: rgba(255,255,255,0.05); border: none; padding: 8px 16px; border-radius: 40px; color: white; cursor: pointer; }
        .btn-danger { background: rgba(231,76,60,0.2); color: #ff8a7a; }
        .settings-card {
            background: var(--bg-elevated); border-radius: 32px; padding: 24px;
            border: 1px solid var(--border-light);
            max-width: 600px;
        }
        .settings-card .form-group { margin-bottom: 20px; }
        .logo-upload-area {
            background: #0c0f18; border: 2px dashed var(--border-light); border-radius: 28px;
            padding: 20px; text-align: center; cursor: pointer; margin-bottom: 16px;
            transition: 0.2s;
        }
        .logo-upload-area:hover { border-color: var(--accent-primary); background: rgba(255,122,47,0.05); }
        .logo-preview {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .logo-preview img {
            max-height: 60px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            padding: 4px;
            background: #0c0f18;
        }
        .remove-logo-btn {
            background: rgba(231,76,60,0.2);
            border: none;
            color: #ff8a7a;
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
        }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(7,9,15,0.92); backdrop-filter: blur(16px);
            display: flex; justify-content: space-around; padding: 10px 0 20px;
            border-top: 1px solid rgba(255,122,47,0.2);
        }
        .nav-item { background: none; border: none; color: #8e8e9e; font-size: 13px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
        .nav-item.active { color: var(--accent-primary); }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1e1f2a; color: white; padding: 12px 28px; border-radius: 60px; font-size: 14px; opacity: 0; transition: 0.2s; z-index: 1200; border-left: 4px solid var(--accent-primary); pointer-events: none; }
        .toast.show { opacity: 1; }
        .back-btn { background: none; border: 1px solid var(--border-light); padding: 8px 20px; border-radius: 40px; margin-bottom: 20px; color: white; cursor: pointer; }

        .image-upload-area {
            background: #0c0f18; border: 2px dashed var(--border-light); border-radius: 28px;
            padding: 20px; text-align: center; cursor: pointer; margin-bottom: 16px;
            transition: 0.2s;
        }
        .image-upload-area:hover { border-color: var(--accent-primary); background: rgba(255,122,47,0.05); }
        .image-preview-list {
            display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px;
        }
        .image-preview-item {
            position: relative; width: 80px; height: 80px; border-radius: 16px;
            overflow: hidden; border: 1px solid var(--border-light);
        }
        .image-preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .remove-image-btn {
            position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6);
            border: none; color: white; border-radius: 20px; width: 20px; height: 20px;
            font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div class="logo" id="logoClick">
            <span id="logoContainer"></span>
        </div>
        <button class="cart-btn" onclick="navigateTo('cart')">
            🛒 <span id="cartCount">0</span>
        </button>
    </div>
</div>

<div id="pageHome" class="page active">
    <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="Поиск ассетов, аддонов..." oninput="filterProducts()">
    </div>
    <div class="categories" id="categoriesList"></div>
    <div id="productsGridContainer" class="products-grid"></div>
</div>

<div id="pageCart" class="page">
    <div class="cart-container">
        <button class="back-btn" onclick="navigateTo('home')">← Назад в каталог</button>
        <h2 style="font-size: 28px; margin-bottom: 20px;">🛒 Корзина</h2>
        <div id="cartItems"></div>
        <div id="cartTotal"></div>
        <div id="checkoutForm" style="display:none;">
            <div class="form-card">
                <div class="form-group"><input type="text" id="customerName" placeholder="Ваше имя"></div>
                <div class="form-group"><input type="email" id="customerEmail" placeholder="Email для файлов"></div>
                <button class="checkout-btn" onclick="processOrder()">✅ Подтвердить заказ</button>
            </div>
        </div>
    </div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <button class="modal-close" style="position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); border: none; border-radius: 60px; width: 36px; height: 36px; color: white; font-size: 20px; cursor: pointer;" onclick="closeModal()">✖</button>
        <div class="gallery" id="modalGallery"></div>
        <div class="gallery-nav" id="galleryNav"></div>
        <div class="product-header">
            <h2 id="modalName" style="font-size: 26px;"></h2>
            <a id="youtubeLink" class="youtube-btn" href="#" target="_blank" style="display: none;">
                ▶ Смотреть видео
            </a>
        </div>
        <div id="modalCategory" style="color:#aaa; margin: 6px 0;"></div>
        <div id="modalPrice" style="margin: 12px 0;"></div>
        <p id="modalDesc" style="line-height: 1.5; color: #cfcfdf;"></p>
        <button id="modalAddBtn" class="add-btn" style="margin-top: 20px;">➕ В корзину</button>
    </div>
</div>

<!-- Админ-панель (только для вас) -->
<div id="adminPanel" class="admin-panel">
    <div class="admin-header">
        <h2 style="font-weight: 700;">🔧 Админ-панель</h2>
        <button class="btn-icon btn-danger" onclick="closeAdminPanel()">✖ Закрыть</button>
    </div>
    <div class="admin-tabs">
        <button class="admin-tab" data-tab="categoriesTab">📁 Категории</button>
        <button class="admin-tab" data-tab="productsTab">📦 Товары</button>
        <button class="admin-tab" data-tab="settingsTab">⚙️ Настройки</button>
    </div>

    <div id="categoriesTab" class="admin-section">
        <div class="admin-layout">
            <div class="categories-sidebar">
                <h3>📁 Категории (папки)</h3>
                <div id="adminCategoryList"></div>
                <div class="add-cat-form">
                    <input type="text" id="newAdminCatName" placeholder="Новая категория">
                    <button class="btn-icon" style="background: var(--accent-primary); color:#0a0c15;" onclick="addCategoryFromAdmin()">➕</button>
                </div>
            </div>
            <div class="right-content">
                <div class="products-in-cat">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 id="currentCategoryTitle">📦 Товары в категории</h3>
                        <button class="btn-icon" style="background: var(--accent-primary); color:#0a0c15;" onclick="addProductInCurrentCategory()">➕ Новый товар</button>
                    </div>
                    <div id="adminProductsByCategory"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="productsTab" class="admin-section">
        <div style="margin-bottom: 20px;">
            <button class="btn-icon" style="background: var(--accent-primary); color:#0a0c15;" onclick="addGlobalProduct()">➕ Добавить товар</button>
        </div>
        <div id="allProductsList"></div>
    </div>

    <div id="settingsTab" class="admin-section">
        <div class="settings-card">
            <h3 style="margin-bottom: 20px;">⚙️ Настройки магазина</h3>
            <div class="form-group">
                <label style="display:block; margin-bottom: 6px;">Название магазина</label>
                <input type="text" id="settingsStoreName" placeholder="Название">
            </div>
            <div class="form-group">
                <label style="display:block; margin-bottom: 6px;">Текстовый логотип</label>
                <input type="text" id="settingsLogoText" placeholder="🌀 BLENDER STORE">
            </div>
            <div class="form-group">
                <label style="display:block; margin-bottom: 6px;">Логотип (изображение)</label>
                <div id="logoUploadArea" class="logo-upload-area" onclick="document.getElementById('logoFileInput').click()">
                    📸 Нажмите или перетащите изображение
                    <input type="file" id="logoFileInput" accept="image/*" style="display:none" onchange="handleLogoUpload(event)">
                </div>
                <div id="logoPreviewContainer" class="logo-preview"></div>
                <button class="remove-logo-btn" onclick="removeLogo()">🗑️ Удалить логотип</button>
            </div>
            <button class="checkout-btn" onclick="saveSettings()" style="margin-top: 20px;">💾 Сохранить настройки</button>
        </div>
    </div>
</div>

<div id="editProductModal" class="modal">
    <div class="modal-content" style="max-width: 650px;">
        <button class="modal-close" style="position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); border: none; border-radius: 60px; width: 36px; height: 36px; color: white; font-size: 20px; cursor: pointer;" onclick="closeEditProductModal()">✖</button>
        <h3 style="margin-bottom: 20px;">✏️ Редактировать товар</h3>
        <input type="hidden" id="editProductId">
        <div class="form-group"><input type="text" id="editName" placeholder="Название товара"></div>
        <div class="form-group">
            <select id="editCategoryId" style="background:#0c0f18; border:1px solid var(--border-light); border-radius:28px; padding:12px; width:100%; color:white;"></select>
        </div>
        <div class="form-group"><input type="number" id="editPrice" placeholder="Цена"></div>
        <div class="form-group"><input type="number" id="editOldPrice" placeholder="Старая цена"></div>
        <div class="form-group"><input type="text" id="editFileUrl" placeholder="Ссылка на файл"></div>
        <div class="form-group"><input type="text" id="editYoutubeUrl" placeholder="Ссылка на YouTube видео"></div>
        
        <label style="display:block; margin: 12px 0 8px;">Изображения товара</label>
        <div id="imageUploadArea" class="image-upload-area" onclick="document.getElementById('imageFileInput').click()">
            📸 Нажмите или перетащите изображения
            <input type="file" id="imageFileInput" multiple accept="image/*" style="display:none" onchange="handleImageFiles(event)">
        </div>
        <div id="imagePreviewList" class="image-preview-list"></div>
        
        <div class="form-group"><textarea id="editDesc" rows="3" placeholder="Описание товара" style="background:#0c0f18; border-radius:24px; padding:12px; width:100%;"></textarea></div>
        <button class="checkout-btn" onclick="saveProductChanges()">💾 Сохранить</button>
    </div>
</div>

<div class="toast" id="toastMsg">Сообщение</div>
<div class="bottom-nav">
    <button class="nav-item active" onclick="navigateTo('home')">🏠 Каталог</button>
    <button class="nav-item" onclick="navigateTo('cart')">🛒 Корзина</button>
</div>

<script>
    // Telegram WebApp инициализация
    let tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }
       
    const ADMIN_ID = 379731685;      
    // Функция проверки прав администратора
    function isAdmin() {
        if (!tg) return false;
        const userId = tg.initDataUnsafe?.user?.id;
        return userId === ADMIN_ID;
    }
    // ============================================================
    
    // Настройки (без пароля)
    let settings = {
        storeName: "BLENMAN STORE",
        logoText: "BLENMAN STORE",
        logoImage: null
    };
    
    function loadSettings() {
        const saved = localStorage.getItem('blender_settings');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                settings = { ...settings, ...parsed };
            } catch(e) {}
        }
        document.title = settings.storeName;
        if (document.getElementById('settingsStoreName')) document.getElementById('settingsStoreName').value = settings.storeName;
        if (document.getElementById('settingsLogoText')) document.getElementById('settingsLogoText').value = settings.logoText;
        updateLogoDisplay();
    }
    
    function updateLogoDisplay() {
        const container = document.getElementById('logoContainer');
        if (!container) return;
        container.innerHTML = '';
        if (settings.logoImage && settings.logoImage.startsWith('data:image')) {
            const img = document.createElement('img');
            img.src = settings.logoImage;
            img.className = 'logo-img';
            img.alt = "Logo";
            container.appendChild(img);
        }
        const textSpan = document.createElement('span');
        textSpan.className = 'logo-text';
        textSpan.innerText = settings.logoText;
        container.appendChild(textSpan);
        
        const previewContainer = document.getElementById('logoPreviewContainer');
        if (previewContainer) {
            if (settings.logoImage && settings.logoImage.startsWith('data:image')) {
                previewContainer.innerHTML = `<img src="${settings.logoImage}" alt="Logo preview"><span>Текущий логотип</span>`;
            } else {
                previewContainer.innerHTML = '<span style="color:#aaa;">Логотип не загружен</span>';
            }
        }
    }
    
    function handleLogoUpload(event) {
        const file = event.target.files[0];
        if (!file || !file.type.startsWith('image/')) {
            showToast("Выберите изображение");
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            settings.logoImage = e.target.result;
            localStorage.setItem('blender_settings', JSON.stringify(settings));
            updateLogoDisplay();
            showToast("Логотип загружен");
        };
        reader.readAsDataURL(file);
        document.getElementById('logoFileInput').value = '';
    }
    
    function removeLogo() {
        settings.logoImage = null;
        localStorage.setItem('blender_settings', JSON.stringify(settings));
        updateLogoDisplay();
        showToast("Логотип удалён");
    }
    
    function saveSettings() {
        const newStoreName = document.getElementById('settingsStoreName').value.trim();
        const newLogoText = document.getElementById('settingsLogoText').value.trim();
        if (newStoreName) settings.storeName = newStoreName;
        if (newLogoText) settings.logoText = newLogoText;
        localStorage.setItem('blender_settings', JSON.stringify(settings));
        document.title = settings.storeName;
        updateLogoDisplay();
        showToast("Настройки сохранены");
    }
    
    const DEFAULT_CATEGORIES = [
        { id: "cat1", name: "Add-on" },
        { id: "cat2", name: "Скрипты" },
        { id: "cat4", name: "Бандлы" },
        { id: "cat5", name: "Материалы" }
    ];
    const DEFAULT_PRODUCTS = [
        { id: 1, name: "NodeFlow Pro", categoryId: "cat1", price: 890, oldPrice: 1290, fileUrl: "https://example.com/nodeflow.zip", description: "Визуальный редактор нод.", images: [], youtubeUrl: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" },
        { id: 2, name: "RetopoMaster", categoryId: "cat1", price: 1490, oldPrice: null, fileUrl: "https://example.com/retopo.zip", description: "Автоматическая ретопология.", images: [], youtubeUrl: "" },
        { id: 3, name: "Procedural Worlds", categoryId: "cat5", price: 590, oldPrice: 790, fileUrl: "https://example.com/worlds.blend", description: "Генератор миров.", images: [], youtubeUrl: "" },
        { id: 4, name: "Magic Terrain", categoryId: "cat5", price: 790, oldPrice: null, fileUrl: "https://example.com/terrain.blend", description: "Процедурный ландшафт.", images: [], youtubeUrl: "" },
        { id: 5, name: "CyberCity", categoryId: "cat4", price: 1290, oldPrice: 1990, fileUrl: "https://example.com/city.blend", description: "Киберпанк город.", images: [], youtubeUrl: "" },
        { id: 6, name: "Space Hulk", categoryId: "cat4", price: 990, oldPrice: null, fileUrl: "https://example.com/space.blend", description: "Космический корабль.", images: [], youtubeUrl: "" }
    ];
    
    let categories = JSON.parse(localStorage.getItem('blender_categories')) || DEFAULT_CATEGORIES;
    let products = JSON.parse(localStorage.getItem('blender_products')) || DEFAULT_PRODUCTS;
    let cart = JSON.parse(localStorage.getItem('blender_cart')) || [];
    let currentAdminCategoryId = categories[0]?.id || null;
    let tempImages = [];
    
    function saveCategories() { localStorage.setItem('blender_categories', JSON.stringify(categories)); }
    function saveProducts() { localStorage.setItem('blender_products', JSON.stringify(products)); }
    function saveCart() { localStorage.setItem('blender_cart', JSON.stringify(cart)); updateCartBadge(); }
    function formatPrice(p) { return p === 0 ? "Бесплатно" : p.toLocaleString() + " ₽"; }
    function updateCartBadge() { document.getElementById('cartCount').innerText = cart.length; }
    function showToast(msg) { let t = document.getElementById('toastMsg'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
    
    function getPreviewImage(product) {
        if (product.images && product.images.length > 0 && product.images[0]) return product.images[0];
        return "https://placehold.co/1024x1024/2b2b3a/white?text=No+Image";
    }
    
    let currentCategoryId = null, searchQuery = "";
    function renderCategories() {
        const container = document.getElementById('categoriesList');
        container.innerHTML = `<div class="chip ${currentCategoryId === null ? 'active' : ''}" data-cat="">🔥 Все</div>` +
            categories.map(c => `<div class="chip ${currentCategoryId === c.id ? 'active' : ''}" data-cat="${c.id}">${c.name}</div>`).join('');
        document.querySelectorAll('.chip').forEach(ch => {
            ch.addEventListener('click', () => {
                currentCategoryId = ch.dataset.cat === "" ? null : ch.dataset.cat;
                renderCategories();
                renderProducts();
            });
        });
    }
    function filterProducts() { searchQuery = document.getElementById('searchInput').value.toLowerCase(); renderProducts(); }
    function renderProducts() {
        let filtered = products.filter(p => {
            if (currentCategoryId && p.categoryId !== currentCategoryId) return false;
            if (searchQuery && !p.name.toLowerCase().includes(searchQuery)) return false;
            return true;
        });
        const grid = document.getElementById('productsGridContainer');
        if (!filtered.length) { grid.innerHTML = '<div style="text-align:center;padding:40px;">✨ Ничего не найдено</div>'; return; }
        grid.innerHTML = filtered.map(p => `
            <div class="product-card" onclick="openProductModal(${p.id})">
                <img class="product-preview" src="${getPreviewImage(p)}" alt="${escapeHtml(p.name)}" loading="lazy">
                <div class="product-name">${escapeHtml(p.name)}</div>
                <div><span class="current-price">${formatPrice(p.price)}</span>${p.oldPrice ? `<span class="old-price">${formatPrice(p.oldPrice)}</span>` : ''}</div>
                <button class="add-btn" onclick="event.stopPropagation(); toggleCart(${p.id})">${cart.some(i=>i.id===p.id) ? '✓ В корзине' : '+ В корзину'}</button>
            </div>
        `).join('');
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    function toggleCart(id) {
        let idx = cart.findIndex(i=>i.id===id);
        if (idx !== -1) cart.splice(idx,1);
        else {
            let prod = products.find(p=>p.id===id);
            cart.push({ id: prod.id, name: prod.name, price: prod.price, fileUrl: prod.fileUrl, preview: getPreviewImage(prod) });
        }
        saveCart(); renderProducts(); renderCart(); showToast(idx===-1 ? "Добавлено" : "Удалено");
    }
    
    let currentModalProduct = null, currentImageIndex = 0;
    window.openProductModal = function(id) {
        let p = products.find(x=>x.id===id);
        if (!p) return;
        currentModalProduct = p;
        currentImageIndex = 0;
        let images = p.images && p.images.length ? p.images : [getPreviewImage(p)];
        const galleryDiv = document.getElementById('modalGallery');
        galleryDiv.innerHTML = images.map((img, i) => `<img class="gallery-img" src="${img}" style="display:${i===0?'block':'none'};">`).join('');
        const nav = document.getElementById('galleryNav');
        nav.innerHTML = images.map((_, idx) => `<div class="gallery-dot ${idx === currentImageIndex ? 'active' : ''}" data-dot="${idx}"></div>`).join('');
        document.querySelectorAll('.gallery-dot').forEach(dot => dot.addEventListener('click', (e) => {
            currentImageIndex = parseInt(e.target.dataset.dot);
            updateGallery();
        }));
        function updateGallery() {
            document.querySelectorAll('#modalGallery .gallery-img').forEach((img, i) => img.style.display = i === currentImageIndex ? 'block' : 'none');
            document.querySelectorAll('#galleryNav .gallery-dot').forEach((dot, i) => {
                if (i === currentImageIndex) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }
        document.getElementById('modalName').innerText = p.name;
        document.getElementById('modalCategory').innerHTML = categories.find(c=>c.id===p.categoryId)?.name || "Без категории";
        document.getElementById('modalPrice').innerHTML = `<span class="current-price">${formatPrice(p.price)}</span>${p.oldPrice ? `<span class="old-price">${formatPrice(p.oldPrice)}</span>` : ''}`;
        document.getElementById('modalDesc').innerText = p.description || "Описание отсутствует";
        const youtubeLink = document.getElementById('youtubeLink');
        if (p.youtubeUrl && p.youtubeUrl.trim() !== "") {
            youtubeLink.href = p.youtubeUrl;
            youtubeLink.style.display = "inline-flex";
        } else {
            youtubeLink.style.display = "none";
        }
        document.getElementById('modalAddBtn').innerText = cart.some(i=>i.id===p.id) ? "✓ Уже в корзине" : "➕ В корзину";
        document.getElementById('productModal').classList.add('active');
    };
    window.closeModal = function() { document.getElementById('productModal').classList.remove('active'); currentModalProduct = null; };
    document.getElementById('modalAddBtn').onclick = () => {
        if (currentModalProduct && !cart.some(i=>i.id===currentModalProduct.id)) toggleCart(currentModalProduct.id);
        else if (currentModalProduct) showToast("Уже в корзине");
        closeModal();
    };
    
    function renderCart() {
        const container = document.getElementById('cartItems');
        if (!cart.length) {
            container.innerHTML = '<div style="text-align:center;padding:40px;">🛍️ Корзина пуста</div>';
            document.getElementById('cartTotal').innerHTML = '';
            document.getElementById('checkoutForm').style.display = 'none';
            return;
        }
        container.innerHTML = cart.map(item => `
            <div class="cart-item">
                <div><img class="cart-preview" src="${item.preview}" alt=""> ${item.name} - ${formatPrice(item.price)}</div>
                <button class="remove-item" onclick="removeFromCart(${item.id})">Удалить</button>
            </div>
        `).join('');
        let total = cart.reduce((s,i) => s + i.price, 0);
        document.getElementById('cartTotal').innerHTML = `<div class="total-block">Итого: ${formatPrice(total)}</div>`;
        document.getElementById('checkoutForm').style.display = 'block';
    }
    window.removeFromCart = function(id) { cart = cart.filter(i => i.id !== id); saveCart(); renderCart(); renderProducts(); };
    window.processOrder = function() {
        const name = document.getElementById('customerName').value.trim();
        const email = document.getElementById('customerEmail').value.trim();
        if (!name || !email) { showToast("Заполните имя и email"); return; }
        if (!cart.length) return;
        const links = cart.map(item => {
            const full = products.find(p => p.id === item.id);
            return { name: item.name, url: full?.fileUrl || item.fileUrl };
        }).filter(l => l.url);
        let html = `<div class="order-success"><h3>✅ Спасибо, ${name}!</h3><p>Ваши файлы:</p>`;
        links.forEach(l => html += `<a class="download-link" style="display:inline-block; background:#ff7a2f; margin:8px; padding:8px 16px; border-radius:40px; color:#0a0c15; text-decoration:none;" href="${l.url}" target="_blank">📥 ${l.name}</a>`);
        html += `<br><button class="checkout-btn" style="margin-top:16px;" onclick="location.reload()">Закрыть</button></div>`;
        document.getElementById('cartItems').innerHTML = html;
        document.getElementById('cartTotal').innerHTML = '';
        document.getElementById('checkoutForm').style.display = 'none';
        cart = [];
        saveCart();
        if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    };
    window.navigateTo = function(page) {
        document.getElementById('pageHome').classList.toggle('active', page === 'home');
        document.getElementById('pageCart').classList.toggle('active', page === 'cart');
        document.querySelectorAll('.nav-item').forEach((btn,i) => btn.classList.toggle('active', (page === 'home' && i===0) || (page === 'cart' && i===1)));
        if (page === 'cart') renderCart();
        closeModal();
    };
    
    // Админ-функции (доступны только администратору)
    function renderAdminCategoriesSidebar() {
        const container = document.getElementById('adminCategoryList');
        container.innerHTML = categories.map(cat => `
            <div class="category-folder ${currentAdminCategoryId === cat.id ? 'active' : ''}" data-catid="${cat.id}">
                <span>📂 ${cat.name}</span>
                <button class="delete-cat-btn" data-catid="${cat.id}">🗑️</button>
            </div>
        `).join('');
        document.querySelectorAll('.category-folder').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-cat-btn')) return;
                currentAdminCategoryId = el.dataset.catid;
                renderAdminCategoriesSidebar();
                renderProductsByCategory();
                document.getElementById('currentCategoryTitle').innerHTML = `📦 Товары в категории: ${categories.find(c=>c.id===currentAdminCategoryId)?.name || '?'}`;
            });
            const delBtn = el.querySelector('.delete-cat-btn');
            if (delBtn) delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteCategoryById(el.dataset.catid); });
        });
    }
    function deleteCategoryById(catId) {
        if (!confirm(`Удалить категорию и все товары в ней?`)) return;
        products = products.filter(p => p.categoryId !== catId);
        categories = categories.filter(c => c.id !== catId);
        if (currentAdminCategoryId === catId) currentAdminCategoryId = categories[0]?.id || null;
        saveCategories(); saveProducts();
        renderAdminCategoriesSidebar();
        renderProductsByCategory();
        renderAllProductsList();
        renderCategories(); renderProducts();
        showToast("Категория удалена");
    }
    window.addCategoryFromAdmin = function() {
        if (!isAdmin()) { showToast("Доступ запрещён"); return; }
        const name = document.getElementById('newAdminCatName').value.trim();
        if (!name) return showToast("Введите название");
        categories.push({ id: "cat_" + Date.now(), name });
        saveCategories();
        renderAdminCategoriesSidebar();
        renderAllProductsList();
        renderCategories();
        document.getElementById('newAdminCatName').value = '';
        showToast(`Категория "${name}" добавлена`);
    };
    function renderProductsByCategory() {
        const container = document.getElementById('adminProductsByCategory');
        if (!currentAdminCategoryId) { container.innerHTML = '<div style="padding:20px;text-align:center;">Выберите категорию</div>'; return; }
        const categoryProducts = products.filter(p => p.categoryId === currentAdminCategoryId);
        if (!categoryProducts.length) { container.innerHTML = '<div style="padding:20px;text-align:center;">Нет товаров</div>'; return; }
        container.innerHTML = categoryProducts.map(p => `
            <div class="product-admin-row">
                <div class="product-admin-info" onclick="openEditProductModal(${p.id})">
                    <img class="admin-preview" src="${getPreviewImage(p)}">
                    <div><strong>${escapeHtml(p.name)}</strong><br><span>${formatPrice(p.price)}</span></div>
                </div>
                <div>
                    <button class="btn-icon" onclick="event.stopPropagation(); openEditProductModal(${p.id})">✏️ Ред.</button>
                    <button class="btn-icon btn-danger" onclick="event.stopPropagation(); deleteProductById(${p.id})">🗑️</button>
                </div>
            </div>
        `).join('');
    }
    function renderAllProductsList() {
        const container = document.getElementById('allProductsList');
        if (!products.length) { container.innerHTML = '<div style="padding:20px;text-align:center;">Нет товаров</div>'; return; }
        container.innerHTML = products.map(p => `
            <div class="product-admin-row">
                <div class="product-admin-info" onclick="openEditProductModal(${p.id})">
                    <img class="admin-preview" src="${getPreviewImage(p)}">
                    <div><strong>${escapeHtml(p.name)}</strong><br><span>${categories.find(c=>c.id===p.categoryId)?.name || 'Без категории'} | ${formatPrice(p.price)}</span></div>
                </div>
                <div>
                    <button class="btn-icon" onclick="event.stopPropagation(); openEditProductModal(${p.id})">✏️ Ред.</button>
                    <button class="btn-icon btn-danger" onclick="event.stopPropagation(); deleteProductById(${p.id})">🗑️</button>
                </div>
            </div>
        `).join('');
    }
    window.addProductInCurrentCategory = function() {
        if (!isAdmin()) { showToast("Доступ запрещён"); return; }
        if (!currentAdminCategoryId) { showToast("Выберите категорию"); return; }
        const newId = Date.now();
        products.push({ id: newId, name: "Новый ассет", categoryId: currentAdminCategoryId, price: 0, oldPrice: null, fileUrl: "", youtubeUrl: "", images: [], description: "Добавьте описание" });
        saveProducts();
        renderProductsByCategory();
        renderAllProductsList();
        renderProducts();
        openEditProductModal(newId);
    };
    window.addGlobalProduct = function() {
        if (!isAdmin()) { showToast("Доступ запрещён"); return; }
        const newId = Date.now();
        products.push({ id: newId, name: "Новый ассет", categoryId: categories[0]?.id || null, price: 0, oldPrice: null, fileUrl: "", youtubeUrl: "", images: [], description: "" });
        saveProducts();
        renderAllProductsList();
        renderProductsByCategory();
        renderProducts();
        openEditProductModal(newId);
    };
    window.deleteProductById = function(id) {
        if (!isAdmin()) { showToast("Доступ запрещён"); return; }
        if (!confirm("Удалить товар?")) return;
        products = products.filter(p => p.id !== id);
        saveProducts();
        renderProductsByCategory();
        renderAllProductsList();
        renderProducts();
        showToast("Товар удалён");
    };
    
    function handleImageFiles(event) {
        const files = Array.from(event.target.files);
        for (let file of files) {
            if (!file.type.startsWith('image/')) continue;
            const reader = new FileReader();
            reader.onload = function(e) { tempImages.push(e.target.result); renderImagePreviewList(); };
            reader.readAsDataURL(file);
        }
        document.getElementById('imageFileInput').value = '';
    }
    function renderImagePreviewList() {
        const container = document.getElementById('imagePreviewList');
        container.innerHTML = tempImages.map((img, idx) => `
            <div class="image-preview-item">
                <img src="${img}">
                <button class="remove-image-btn" data-index="${idx}">✖</button>
            </div>
        `).join('');
        document.querySelectorAll('.remove-image-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                tempImages.splice(parseInt(btn.dataset.index), 1);
                renderImagePreviewList();
            });
        });
    }
    
    window.openEditProductModal = function(id) {
        if (!isAdmin()) { showToast("Доступ запрещён"); return; }
        const prod = products.find(p => p.id === id);
        if (!prod) return;
        tempImages = prod.images ? [...prod.images] : [];
        renderImagePreviewList();
        document.getElementById('editProductId').value = id;
        document.getElementById('editName').value = prod.name;
        const catSelect = document.getElementById('editCategoryId');
        catSelect.innerHTML = `<option value="">— Без категории —</option>` + categories.map(c => `<option value="${c.id}" ${prod.categoryId === c.id ? 'selected' : ''}>${c.name}</option>`).join('');
        document.getElementById('editPrice').value = prod.price;
        document.getElementById('editOldPrice').value = prod.oldPrice || '';
        document.getElementById('editFileUrl').value = prod.fileUrl || '';
        document.getElementById('editYoutubeUrl').value = prod.youtubeUrl || '';
        document.getElementById('editDesc').value = prod.description || '';
        document.getElementById('editProductModal').classList.add('active');
    };
    window.closeEditProductModal = function() { document.getElementById('editProductModal').classList.remove('active'); tempImages = []; };
    window.saveProductChanges = function() {
        if (!isAdmin()) { showToast("Доступ запрещён"); closeEditProductModal(); return; }
        const id = parseInt(document.getElementById('editProductId').value);
        const prod = products.find(p => p.id === id);
        if (prod) {
            prod.name = document.getElementById('editName').value;
            prod.categoryId = document.getElementById('editCategoryId').value || null;
            prod.price = parseInt(document.getElementById('editPrice').value) || 0;
            prod.oldPrice = document.getElementById('editOldPrice').value ? parseInt(document.getElementById('editOldPrice').value) : null;
            prod.fileUrl = document.getElementById('editFileUrl').value;
            prod.youtubeUrl = document.getElementById('editYoutubeUrl').value;
            prod.images = [...tempImages];
            prod.description = document.getElementById('editDesc').value;
            saveProducts();
            renderProductsByCategory();
            renderAllProductsList();
            renderProducts();
            showToast("Товар сохранён");
            closeEditProductModal();
        }
    };
    
    const uploadArea = document.getElementById('imageUploadArea');
    if (uploadArea) {
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#ff7a2f'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = 'var(--border-light)'; });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'var(--border-light)';
            const files = Array.from(e.dataTransfer.files);
            for (let file of files) {
                if (!file.type.startsWith('image/')) continue;
                const reader = new FileReader();
                reader.onload = function(ev) { tempImages.push(ev.target.result); renderImagePreviewList(); };
                reader.readAsDataURL(file);
            }
        });
    }
    
    const logoUploadArea = document.getElementById('logoUploadArea');
    if (logoUploadArea) {
        logoUploadArea.addEventListener('dragover', (e) => { e.preventDefault(); logoUploadArea.style.borderColor = '#ff7a2f'; });
        logoUploadArea.addEventListener('dragleave', () => { logoUploadArea.style.borderColor = 'var(--border-light)'; });
        logoUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            logoUploadArea.style.borderColor = 'var(--border-light)';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    settings.logoImage = ev.target.result;
                    localStorage.setItem('blender_settings', JSON.stringify(settings));
                    updateLogoDisplay();
                    showToast("Логотип загружен");
                };
                reader.readAsDataURL(file);
            }
        });
    }
    
    // Вход в админ-панель только по Telegram ID
    function showAdminPanel() {
        if (!isAdmin()) {
            showToast("⛔ Доступ запрещён. Вы не администратор.");
            return;
        }
        currentAdminCategoryId = categories[0]?.id || null;
        renderAdminCategoriesSidebar();
        renderProductsByCategory();
        renderAllProductsList();
        document.getElementById('currentCategoryTitle').innerHTML = currentAdminCategoryId ? `📦 Товары в категории: ${categories.find(c=>c.id===currentAdminCategoryId)?.name || ''}` : '📦 Товары в категории';
        document.getElementById('adminPanel').classList.add('active');
        document.querySelectorAll('.admin-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.admin-section').forEach(sec => sec.classList.remove('active'));
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });
        document.querySelector('.admin-tab').click();
    }
    window.closeAdminPanel = function() { document.getElementById('adminPanel').classList.remove('active'); };
    
    let clickCount = 0, clickTimer;
    document.getElementById('logoClick').addEventListener('click', () => {
        clickCount++;
        clearTimeout(clickTimer);
        clickTimer = setTimeout(() => clickCount = 0, 800);
        if (clickCount >= 5) { clickCount = 0; showAdminPanel(); }
    });
    
    function init() {
        loadSettings();
        renderCategories();
        renderProducts();
        updateCartBadge();
        if (tg?.BackButton) {
            tg.BackButton.onClick(() => { if (document.getElementById('pageHome').classList.contains('active')) tg.close(); else navigateTo('home'); });
            tg.BackButton.hide();
        }
    }
    init();
    
    window.toggleCart = toggleCart;
    window.filterProducts = filterProducts;
    window.handleImageFiles = handleImageFiles;
</script>
</body>
</html>

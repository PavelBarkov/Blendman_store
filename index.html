er);border-radius:28px;padding:20px;cursor:pointer;transition:0.2s}.product-card:hover{transform:translateY(-6px);border-color:var(--accent)}.product-preview{width:100%;aspect-ratio:1;object-fit:cover;border-radius:20px;background:#0c0f18;margin-bottom:16px}.product-name{font-size:20px;font-weight:700;margin:8px 0 4px}.current-price{color:var(--accent);font-weight:800;font-size:22px}.old-price{text-decoration:line-through;color:#8e8e9e;font-size:14px;margin-left:8px}.add-btn{background:rgba(255,122,47,0.12);border:1px solid rgba(255,122,47,0.4);color:var(--accent);padding:10px;border-radius:60px;width:100%;font-weight:600;margin-top:16px;cursor:pointer;transition:0.2s}.add-btn:hover{background:var(--accent);color:#0a0c15}.page{display:none}.page.active{display:block}.cart-container{max-width:900px;margin:0 auto;padding:24px 20px}.cart-item{background:var(--bg-card);border-radius:28px;padding:18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border)}.cart-preview{width:48px;height:48px;object-fit:cover;border-radius:12px;margin-right:12px}.remove-item{background:rgba(231,76,60,0.2);border:none;color:#ff6b5e;padding:8px 18px;border-radius:40px;cursor:pointer}.total-block{font-size:28px;font-weight:800;margin:24px 0;text-align:right}.checkout-btn{background:linear-gradient(105deg,var(--accent),#c2410c);border:none;padding:16px;border-radius:60px;font-weight:700;width:100%;color:#fff;cursor:pointer}.form-card{background:#131724;border-radius:32px;padding:24px;margin-top:20px}.form-card input{width:100%;padding:14px;background:#0c0f18;border:1px solid var(--border);border-radius:28px;color:#fff;margin-bottom:12px}.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px}.modal.active{display:flex}.modal-content{background:#11141f;max-width:650px;width:100%;border-radius:48px;padding:24px;border:1px solid rgba(255,122,47,0.5);position:relative}.gallery{display:flex;overflow-x:auto;gap:16px;border-radius:28px;margin-bottom:16px;background:#0c0f18}.gallery-img{flex:0 0 100%;max-height:55vh;object-fit:contain;border-radius:24px}.gallery-dot{width:8px;height:8px;background:#4a4a5a;border-radius:10px;cursor:pointer;margin:0 4px}.gallery-dot.active{background:var(--accent);width:24px}.product-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-top:8px}.youtube-btn{background:rgba(255,0,0,0.15);border:1px solid rgba(255,0,0,0.4);color:#ff3b3b;padding:8px 16px;border-radius:60px;font-size:14px;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:0.2s}.youtube-btn:hover{background:#ff0000;color:#fff}.admin-panel{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0c15;z-index:1100;overflow-y:auto;padding:24px;display:none}.admin-panel.active{display:block}.admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;border-bottom:1px solid var(--border);padding-bottom:16px;flex-wrap:wrap;gap:12px}.admin-tabs{display:flex;gap:8px;background:#131724;padding:6px;border-radius:60px;width:fit-content;margin-bottom:24px}.admin-tab{padding:8px 24px;border-radius:40px;background:transparent;color:#aaa;font-weight:600;cursor:pointer;border:none;transition:0.2s}.admin-tab.active{background:var(--accent);color:#0a0c15}.admin-section{display:none}.admin-section.active{display:block}.admin-layout{display:flex;gap:24px;flex-wrap:wrap}.categories-sidebar{background:#131724;border-radius:32px;padding:20px;width:280px;border:1px solid var(--border)}.categories-sidebar h3{margin-bottom:16px;font-size:18px}.category-folder{background:rgba(255,255,255,0.03);border-radius:20px;padding:12px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:0.2s;border-left:3px solid transparent}.category-folder.acti inter}.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(7,9,15,0.92);backdrop-filter:blur(16px);display:flex;justify-content:space-around;padding:10px 0 20px;border-top:1px solid rgba(255,122,47,0.2)}.nav-item{background:0 0;border:none;color:#8e8e9e;font-size:13px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}.nav-item.active{color:var(--accent)}.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1e1f2a;color:#fff;padding:12px 28px;border-radius:60px;font-size:14px;opacity:0;transition:0.2s;z-index:1200;border-left:4px solid var(--accent);pointer-events:none}.toast.show{opacity:1}.back-btn{background:0 0;border:1px solid var(--border);padding:8px 20px;border-radius:40px;margin-bottom:20px;color:#fff;cursor:pointer}

<body>
<div class="header">
    <div class="header-content">
        <div class="logo" id="logoClick">
            <div id="logoContainer">
                <span class="logo-text">🌀 BlendMan</span>
            </div>
        </div>
        <button class="cart-btn" onclick="navigateTo('cart')">
            🛒 <span id="cartCount">0</span>
        </button>
    </div>
</div>

<div id="pageHome" class="page active">
    <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="Поиск ассетов..." oninput="filterProducts()">
    </div>
    <div class="categories" id="categoriesList"></div>

</div>

<div id="pageCart" class="page">
    <div class="cart-container">
        <button class="back-btn" onclick="navigateTo('home')">← Назад</button>
        <h2>🛒 Корзина</h2>
        <div id="cartItems"></div>
        <div id="cartTotal"></div>
        <div id="checkoutForm" style="display:none;">
            <div class="form-card">
                <input type="text" id="customerName" placeholder="Ваше имя">
                <input type="email" id="customerEmail" placeholder="Email для файлов">
                <button class="checkout-btn" onclick="processOrder()">✅ Подтвердить заказ</button>
            </div>
        </div>
    </div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <button class="modal-close" style="position:absolute;top:20px;right:20px;background:rgba(0,0,0,0.6);border:none;border-radius:60px;width:36px;height:36px;color:#fff;font-size:20px;cursor:pointer" onclick="closeModal()">✖</button>
        <div class="gallery" id="modalGallery"></div>
        <div class="gallery-nav" id="galleryNav" style="display:flex;justify-content:center;gap:8px;margin:12px 0"></div>
        <div class="product-header">
            <h2 id="modalName"></h2>
            <a id="youtubeLink" class="youtube-btn" href="#" target="_blank" style="display:none">▶ Смотреть видео</a>
        </div>
        <div id="modalCategory" style="color:#aaa"></div>
        <div id="modalPrice" style="margin:12px 0"></div>
        <p id="modalDesc"></p>
        <button id="modalAddBtn" class="add-btn" style="margin-top:20px">➕ В корзину</button>

</div>

<div id="adminPanel" class="admin-panel">

    </div>
    <div class="admin-tabs">

    </div>
    <div id="categoriesTab" class="admin-section active">
        <div class="admin-layout">
            <div class="categories-sidebar">
                <h3>📁 Категории (папки)</h3>
                <div id="adminCategoryList"></div>
                <div class="add-cat-form">
                    <input type="text" id="newAdminCatName" placeholder="Новая категория">
                    <button class="btn-icon" style="background:var(--accent);color:#0a0c15" onclick="addCategoryFromAdmin()">➕</button>
                </div>
            </div>
            <div class="right-content">
                <div class="products-in-cat">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
                        <h3 id="currentCategoryTitle">📦 Товары в категории</h3>
                        <button class="btn-icon" style="background:var(--accent);color:#0a0c15" onclick="addProductInCurrentCategory()">➕ Новый товар</button>
                    </div>
                    <div id="adminProductsByCategory"></div>
                </div>
            </div>
        </div>
    </div>
    <div id="productsTab" class="admin-section">
        <button class="btn-icon" style="background:var(--accent);color:#0a0c15;margin-bottom:20px" onclick="addGlobalProduct()">➕ Добавить товар</button>
        <div id="allProductsList"></div>
    </div>
    <div id="settingsTab" class="admin-section">
        <div class="settings-card">
            <h3>⚙️ Настройки магазина</h3>
            <div style="margin:20px 0">
                <input type="text" id="settingsStoreName" placeholder="Название магазина" style="width:100%;padding:14px;background:#0c0f18;border-radius:28px;border:1px solid var(--border);color:#fff">
            </div>
            <div style="margin:20px 0">
                <input type="text" id="settingsLogoText" placeholder="Текстовый логотип" style="width:100%;padding:14px;background:#0c0f18;border-radius:28px;border:1px solid var(--border);color:#fff">
            </div>
            <div>
                <div id="logoUploadArea" class="logo-upload-area" onclick="document.getElementById('logoFileInput').click()">
                    📸 Нажмите или перетащите изображение логотипа

                </div>
                <div id="logoPreviewContainer" style="margin-top:16px"></div>

            <button class="checkout-btn" onclick="saveSettings()" style="margin-top:20px">💾 Сохранить настройки</button>

</div>

<div id="editProductModal" class="modal">
    <div class="modal-content" style="max-width:650px">
        <button class="modal-close" style="position:absolute;top:20px;right:20px;background:rgba(0,0,0,0.6);border:none;border-radius:60px;width:36px;height:36px;color:#fff;font-size:20px;cursor:pointer" onclick="closeEditProductModal()">✖</button>
        <h3>✏️ Редактировать товар</h3>
        <input type="hidden" id="editProductId">
        <div style="margin:12px 0"><input type="text" id="editName" placeholder="Название" style="width:100%;padding:14px;background:#0c0f18;border-radius:28px;border:1px solid var(--border);color:#fff"></div>
        <div style="margin:12px 0"><select id="editCategoryId" style="width:100%;padding:14px;background:#0c0f18;border-radius:28px;border:1px solid var(--border);color:#fff"></select></div>
        <div style="margin:12px 0"><input type="number" id="editPrice" placeholder="Цена" style="width:100%;padding:14px;background:#0c0f18;border-radius:28px;border:1px solid var(--border);color:#fff"></div>
        <div style="margin:12px 0"><input type="number" id="editOldPrice" placeholder="Старая цена" style="width:100%;padding:14px;background:#0c0f18;border-radius:28px;border:1px solid var(--border);color:#fff"></div>
        <div style="margin:12px 0"><input type="text" id="editFileUrl" placeholder="Ссылка на файл" style="width:100%;padding:14px;background:#0c0f18;border-radius:28px;border:1px solid var(--border);color:#fff"></div>
        <div style="margin:12px 0"><input type="text" id="editYoutubeUrl" placeholder="Ссылка на YouTube видео" style="width:100%;padding:14px;background:#0c0f18;border-radius:28px;border:1px solid var(--border);color:#fff"></div>
        <label>Изображения товара</label>
        <div id="imageUploadArea" class="image-upload-area" onclick="document.getElementById('imageFileInput').click()">
            📸 Нажмите или перетащите изображения
            <input type="file" id="imageFileInput" multiple accept="image/*" style="display:none" onchange="handleImageFiles(event)">
        </div>
        <div id="imagePreviewList" class="image-preview-list"></div>
        <div style="margin:12px 0"><textarea id="editDesc" rows="3" placeholder="Описание" style="width:100%;padding:14px;background:#0c0f18;border-radius:28px;border:1px solid var(--border);color:#fff"></textarea></div>
        <button class="checkout-btn" onclick="saveProductChanges()">💾 Сохранить</button>
    </div>
</div>

<div class="toast" id="toastMsg">Сообщение</div>
<div class="bottom-nav">
    <button class="nav-item active" onclick="navigateTo('home')">🏠 Каталог</button>
    <button class="nav-item" onclick="navigateTo('cart')">🛒 Корзина</button>
</div>

<script>
// ==================== НАСТРОЙКИ ====================
const firebaseConfig = {
    apiKey: "AIzaSyCg0EUX3grKMXmKoLKZyGcWSAYPDZ-bwuQ",
    authDomain: "blendmanshop.firebaseapp.com",
    projectId: "blendmanshop",
    storageBucket: "blendmanshop.firebasestorage.app",
    messagingSenderId: "32462864879",
    appId: "1:32462864879:web:958c2f23c98859db9a761a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const SUPABASE_URL = 'https://arrogldacaqtnkzjpcop.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_4rtn65eVe_j_O0V_2qsaVg_05wnidon';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
// ==================================================

const ADMIN_ID = 379731685;
let tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

let categories = [];
let products = [];
let cart = JSON.parse(localStorage.getItem('blender_cart')) || [];
let settings = {storeName:"BlendMan Shop",logoText:"🌀 BlendMan",logoImage:null};
let currentAdminCategoryId = null;
let selectedImageFiles = [];

// ==== ПРОВЕРКА СУЩЕСТВОВАНИЯ НАСТРОЕК В FIREBASE ====
async function ensureSettingsExist() {
    try {
        const docRef = db.collection('settings').doc('main');
        const doc = await docRef.get();
        
        if(!doc.exists) {
            // Создаем настройки по умолчанию
            const defaultSettings = {
                storeName: "BlendMan Shop",
                logoText: "🌀 BlendMan",
                logoImage: null,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            await docRef.set(defaultSettings);
            console.log("✅ Настройки созданы в Firebase");
            return defaultSettings;
        }
        return doc.data();
    } catch(e) {
        console.error("Ошибка при проверке настроек:", e);
        return {
            storeName: "BlendMan Shop",
            logoText: "🌀 BlendMan",
            logoImage: null
        };
    }
}

// ==== ОБНОВЛЕНИЕ ЛОГОТИПА (ИСПРАВЛЕННАЯ ВЕРСИЯ) ====
function updateLogoDisplay() {
    const container = document.getElementById('logoContainer');
    if(!container) {
        console.error("logoContainer not found");
        return;
    }
    container.innerHTML = '';
    
    // Если есть изображение логотипа - показываем только его
    if(settings.logoImage && settings.logoImage !== 'null' && settings.logoImage !== '') {
        const img = document.createElement('img');
        img.src = settings.logoImage;
        img.className = 'logo-img';
        img.alt = "Logo";
        img.onerror = function() {
            console.error("Failed to load logo image:", settings.logoImage);
            // Если изображение не загрузилось, показываем текст
            const span = document.createElement('span');
            span.className = 'logo-text';
            span.innerText = settings.logoText || "🌀 BlendMan";
            container.innerHTML = '';
            container.appendChild(span);
        };
        container.appendChild(img);
        console.log("✅ Логотип-изображение отображается");
    } else {
        // Если нет изображения, показываем текст
        const span = document.createElement('span');
        span.className = 'logo-text';
        span.innerText = settings.logoText || "🌀 BlendMan";
        container.appendChild(span);
        console.log("✅ Текстовый логотип отображается:", settings.logoText);
    }
    
    // Обновляем заголовок страницы
    document.title = settings.storeName || "BlendMan Shop";
    
    // Обновляем preview в админке
    const preview = document.getElementById('logoPreviewContainer');
    if(preview) {
        if(settings.logoImage && settings.logoImage !== 'null' && settings.logoImage !== '') {
            preview.innerHTML = `<img src="${settings.logoImage}" style="height:60px;border-radius:12px;"><span style="margin-left:10px;">Текущий логотип</span>`;
        } else {
            preview.innerHTML = '<span style="color:#aaa;">Нет логотипа, используется текстовый</span>';
        }
    }
}

// ==== ЗАГРУЗКА НАСТРОЕК ИЗ FIRESTORE (ИСПРАВЛЕННАЯ) ====
async function loadSettings() {
    try {
        // Проверяем существование настроек и получаем их
        const settingsData = await ensureSettingsExist();
        
        settings.storeName = settingsData.storeName || "BlendMan Shop";
        settings.logoText = settingsData.logoText || "🌀 BlendMan";
        settings.logoImage = settingsData.logoImage || null;
        
        console.log("✅ Загруженные настройки:", settings);
        
    } catch(e) { 
        console.error("Ошибка загрузки настроек:", e);
        // Устанавливаем значения по умолчанию при ошибке
        settings = {
            storeName: "BlendMan Shop",
            logoText: "🌀 BlendMan",
            logoImage: null
        };
    }

async function loadCategories() {
    try {
        const snapshot = await db.collection('categories').get();
        categories = [];
        snapshot.forEach(doc => categories.push({ id: doc.id, ...doc.data() }));
        if(categories.length === 0) {
            const defaultCats = [
                { id: "cat1", name: "Add-on" },
                { id: "cat2", name: "Скрипты" },
                { id: "cat4", name: "Бандлы" },
                { id: "cat5", name: "Материалы" }
            ];
            for(const cat of defaultCats) {
                await db.collection('categories').doc(cat.id).set(cat);
                categories.push(cat);
            }
        }
        renderCategories();
    } catch(e) { console.error(e); }
}

// ==== ЗАГРУЗКА ТОВАРОВ ====
async function loadProducts() {
    try {
        const snapshot = await db.collection('products').get();
        products = [];

        renderProducts();

}

window.currentCategoryId = null;
window.searchQuery = "";

function filterProducts(){
    window.searchQuery = document.getElementById('searchInput').value.toLowerCase();
    renderProducts();
}

function escapeHtml(str){
    if(!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
}

function getPreviewImage(product){
    if(product.images && product.images.length > 0 && product.images[0]) return product.images[0];
    return "https://placehold.co/1024x1024/2b2b3a/white?text=No+Image";
}

function renderProducts(){
    let filtered = products.filter(p => {
        if(window.currentCategoryId && p.categoryId !== window.currentCategoryId) return false;
        if(window.searchQuery && !p.name.toLowerCase().includes(window.searchQuery)) return false;
        return true;
    });
    const grid = document.getElementById('productsGridContainer');
    if(!filtered.length){
        grid.innerHTML = '<div style="text-align:center;padding:40px;">✨ Ничего не найдено</div>';
        return;
    }
    grid.innerHTML = filtered.map(p => `
        <div class="product-card" onclick="openProductModal(${p.id})">
            <img class="product-preview" src="${getPreviewImage(p)}" loading="lazy">
            <div class="product-name">${escapeHtml(p.name)}</div>
            <div><span class="current-price">${p.price === 0 ? "Бесплатно" : p.price.toLocaleString() + " ₽"}</span>${p.oldPrice ? `<span class="old-price">${p.oldPrice.toLocaleString()} ₽</span>` : ''}</div>
            <button class="add-btn" onclick="event.stopPropagation(); toggleCart(${p.id})">${cart.some(i=>i.id===p.id) ? '✓ В корзине' : '+ В корзину'}</button>
        </div>
    `).join('');
}

function toggleCart(id){
    let idx = cart.findIndex(i => i.id === id);
    if(idx !== -1){
        cart.splice(idx, 1);
    } else {
        let prod = products.find(p => p.id === id);
        cart.push({
            id: prod.id,
            name: prod.name,
            price: prod.price,
            fileUrl: prod.fileUrl,
            preview: getPreviewImage(prod)
        });
    }
    localStorage.setItem('blender_cart', JSON.stringify(cart));
    renderProducts();
    renderCart();
    showToast(idx === -1 ? "Добавлено" : "Удалено");
    updateCartBadge();
}

function renderCart(){
    const container = document.getElementById('cartItems');
    if(!cart.length){
        container.innerHTML = '<div style="text-align:center;padding:40px;">🛍️ Корзина пуста</div>';
        document.getElementById('cartTotal').innerHTML = '';
        document.getElementById('checkoutForm').style.display = 'none';
        return;
    }
    container.innerHTML = cart.map(item => `
        <div class="cart-item">
            <div><img class="cart-preview" src="${item.preview}"> ${item.name} - ${item.price === 0 ? "Бесплатно" : item.price.toLocaleString() + " ₽"}</div>
            <button class="remove-item" onclick="removeFromCart(${item.id})">Удалить</button>
        </div>
    `).join('');
    let total = cart.reduce((s,i) => s + i.price, 0);
    document.getElementById('cartTotal').innerHTML = `<div class="total-block">Итого: ${total === 0 ? "Бесплатно" : total.toLocaleString() + " ₽"}</div>`;
    document.getElementById('checkoutForm').style.display = 'block';
}

function removeFromCart(id){
    cart = cart.filter(i => i.id !== id);
    localStorage.setItem('blender_cart', JSON.stringify(cart));
    renderCart();
    renderProducts();
    updateCartBadge();
}

function processOrder(){
    const name = document.getElementById('customerName').value.trim();
    const email = document.getElementById('customerEmail').value.trim();
    if(!name || !email){
        showToast("Заполните имя и email");
        return;
    }
    if(!cart.length) return;
    const links = cart.map(item => ({ name: item.name, url: item.fileUrl }));
    let html = `<div><h3>✅ Спасибо, ${name}!</h3><p>Ваши файлы:</p>` + 
        links.map(l => `<a href="${l.url}" target="_blank" style="display:inline-block; background:#ff7a2f; margin:8px; padding:8px 16px; border-radius:40px; color:#0a0c15; text-decoration:none;">📥 ${l.name}</a>`).join('') + 
        `<br><button class="checkout-btn" onclick="location.reload()">Закрыть</button></div>`;
    document.getElementById('cartItems').innerHTML = html;
    document.getElementById('cartTotal').innerHTML = '';
    document.getElementById('checkoutForm').style.display = 'none';
    cart = [];
    localStorage.setItem('blender_cart', JSON.stringify(cart));
    updateCartBadge();
    if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}

let currentModalProduct = null, currentImageIndex = 0;

window.openProductModal = function(id){
    let p = products.find(x => x.id === id);
    if(!p) return;
    currentModalProduct = p;
    currentImageIndex = 0;
    let images = p.images?.length ? p.images : [getPreviewImage(p)];
    document.getElementById('modalGallery').innerHTML = images.map((img, i) => `<img class="gallery-img" src="${img}" style="display:${i === 0 ? 'block' : 'none'};">`).join('');
    document.getElementById('galleryNav').innerHTML = images.map((_, idx) => `<div class="gallery-dot ${idx === currentImageIndex ? 'active' : ''}" data-dot="${idx}"></div>`).join('');
    document.querySelectorAll('.gallery-dot').forEach(dot => {
        dot.addEventListener('click', (e) => {
            currentImageIndex = parseInt(e.target.dataset.dot);
            updateGallery();
        });
    });
    function updateGallery(){
        document.querySelectorAll('#modalGallery .gallery-img').forEach((img, i) => img.style.display = i === currentImageIndex ? 'block' : 'none');
        document.querySelectorAll('#galleryNav .gallery-dot').forEach((d, i) => d.classList.toggle('active', i === currentImageIndex));
    }
    document.getElementById('modalName').innerText = p.name;
    document.getElementById('modalCategory').innerHTML = categories.find(c => c.id === p.categoryId)?.name || "Без категории";
    document.getElementById('modalPrice').innerHTML = `<span class="current-price">${p.price === 0 ? "Бесплатно" : p.price.toLocaleString() + " ₽"}</span>${p.oldPrice ? `<span class="old-price">${p.oldPrice.toLocaleString()} ₽</span>` : ''}`;
    document.getElementById('modalDesc').innerText = p.description || "";
    let yt = document.getElementById('youtubeLink');
    if(p.youtubeUrl && p.youtubeUrl.trim()){
        yt.href = p.youtubeUrl;
        yt.style.display = 'inline-flex';
    } else {
        yt.style.display = 'none';
    }
    document.getElementById('modalAddBtn').innerText = cart.some(i => i.id === p.id) ? "✓ Уже в корзине" : "➕ В корзину";
    document.getElementById('productModal').classList.add('active');

async function deleteCategoryById(catId){
    if(!confirm("Удалить категорию и все товары в ней?")) return;

    productsSnapshot.forEach(async doc => await db.collection('products').doc(doc.id).delete());

// ==== ЗАГРУЗКА ИЗОБРАЖЕНИЙ В SUPABASE ====
async function uploadImageToSupabase(file, productId, index){
    const fileExt = file.name.split('.').pop();
    const fileName = `${productId}/${Date.now()}_${index}.${fileExt}`;
    const { error } = await supabase.storage.from('product-images').upload(fileName, file);
    if(error){ console.error(error); return null; }
    const { data: urlData } = supabase.storage.from('product-images').getPublicUrl(fileName);
    return urlData.publicUrl;
}

async function uploadImagesToSupabase(files, productId){
    let urls = [];
    for(let i = 0; i < files.length; i++){
        const url = await uploadImageToSupabase(files[i], productId, i);
        if(url) urls.push(url);
    }
    return urls;
}

function handleImageFiles(event){
    const files = Array.from(event.target.files);
    for(let file of files){
        if(!file.type.startsWith('image/')) continue;
        selectedImageFiles.push(file);
        const reader = new FileReader();
        reader.onload = function(e){
            const div = document.createElement('div');
            div.className = 'image-preview-item';
            div.innerHTML = `<img src="${e.target.result}"><button class="remove-image-btn" data-filename="${file.name}">✖</button>`;
            document.getElementById('imagePreviewList').appendChild(div);
            div.querySelector('.remove-image-btn').addEventListener('click', () => {
                const idx = selectedImageFiles.findIndex(f => f.name === file.name);
                if(idx !== -1) selectedImageFiles.splice(idx, 1);
                div.remove();
            });
        };
        reader.readAsDataURL(file);
    }
    document.getElementById('imageFileInput').value = '';
}

window.openEditProductModal = async function(id){
    const prod = products.find(p => p.id === id);
    if(!prod) return;
    selectedImageFiles = [];
    document.getElementById('imagePreviewList').innerHTML = '';
    if(prod.images){
        for(let imgUrl of prod.images){
            const div = document.createElement('div');
            div.className = 'image-preview-item';
            div.innerHTML = `<img src="${imgUrl}"><button class="remove-image-btn" data-url="${imgUrl}">✖</button>`;
            document.getElementById('imagePreviewList').appendChild(div);
            div.querySelector('.remove-image-btn').addEventListener('click', async () => {
                prod.images = prod.images.filter(u => u !== imgUrl);
                await db.collection('products').doc(String(id)).update({ images: prod.images });
                await loadProducts();
                div.remove();
                showToast("Изображение удалено");
            });
        }
    }
    document.getElementById('editProductId').value = id;
    document.getElementById('editName').value = prod.name;
    const catSelect = document.getElementById('editCategoryId');
    catSelect.innerHTML = `<option value="">— Без категории —</option>` + categories.map(c => `<option value="${c.id}" ${prod.categoryId === c.id ? 'selected' : ''}>${c.name}</option>`).join('');
    document.getElementById('editPrice').value = prod.price;
    document.getElementById('editOldPrice').value = prod.oldPrice || '';
    document.getElementById('editFileUrl').value = prod.fileUrl || '';
    document.getElementById('editYoutubeUrl').value = prod.youtubeUrl || '';
    document.getElementById('editDesc').value = prod.description || '';
    document.getElementById('editProductModal').classList.add('active');
};

window.saveProductChanges = async function(){
    const id = parseInt(document.getElementById('editProductId').value);
    const prod = products.find(p => p.id === id);
    if(!prod) return;
    prod.name = document.getElementById('editName').value;
    prod.categoryId = document.getElementById('editCategoryId').value || null;
    prod.price = parseInt(document.getElementById('editPrice').value) || 0;
    prod.oldPrice = document.getElementById('editOldPrice').value ? parseInt(document.getElementById('editOldPrice').value) : null;
    prod.fileUrl = document.getElementById('editFileUrl').value;
    prod.youtubeUrl = document.getElementById('editYoutubeUrl').value;
    prod.description = document.getElementById('editDesc').value;
    if(selectedImageFiles.length){
        const newUrls = await uploadImagesToSupabase(selectedImageFiles, id);
        prod.images = [...(prod.images || []), ...newUrls];
    }
    await db.collection('products').doc(String(id)).update({
        name: prod.name,
        categoryId: prod.categoryId,
        price: prod.price,
        oldPrice: prod.oldPrice,
        fileUrl: prod.fileUrl,
        youtubeUrl: prod.youtubeUrl,
        images: prod.images,
        description: prod.description
    });
    await loadProducts();
    renderProductsByCategory();
    renderAllProductsList();
    showToast("Товар сохранён в Firebase");
    closeEditProductModal();
};

            showToast("Логотип загружен");
        }
    });
}

const imageArea = document.getElementById('imageUploadArea');
if(imageArea){
    imageArea.addEventListener('dragover', e => { e.preventDefault(); imageArea.style.borderColor = '#ff7a2f'; });
    imageArea.addEventListener('dragleave', () => imageArea.style.borderColor = 'var(--border-light)');
    imageArea.addEventListener('drop', e => {
        e.preventDefault();
        imageArea.style.borderColor = 'var(--border-light)';
        const files = Array.from(e.dataTransfer.files);
        for(let file of files){
            if(!file.type.startsWith('image/')) continue;
            selectedImageFiles.push(file);
            const reader = new FileReader();
            reader.onload = function(ev){
                const div = document.createElement('div');
                div.className = 'image-preview-item';
                div.innerHTML = `<img src="${ev.target.result}"><button class="remove-image-btn" data-filename="${file.name}">✖</button>`;
                document.getElementById('imagePreviewList').appendChild(div);
                div.querySelector('.remove-image-btn').addEventListener('click', () => {
                    const idx = selectedImageFiles.findIndex(f => f.name === file.name);
                    if(idx !== -1) selectedImageFiles.splice(idx, 1);
                    div.remove();
                });
            };
            reader.readAsDataURL(file);
        }
    });
}

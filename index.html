<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Blender Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #07090f;
            color: #f0f3fa;
            padding-bottom: 80px;
        }
        :root {
            --accent: #ff7a2f;
            --bg-card: rgba(18,22,35,0.75);
            --border: rgba(255,255,255,0.08);
        }
        .header {
            position: sticky; top: 0;
            background: rgba(7,9,15,0.8);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            z-index: 100;
        }
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .logo-img { height: 44px; width: auto; border-radius: 14px; }
        .logo-text {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff7a2f, #3b8fc2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .cart-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            gap: 10px;
            cursor: pointer;
        }
        .cart-count {
            background: var(--accent);
            border-radius: 40px;
            padding: 2px 10px;
            font-weight: 700;
        }
        .search-container { max-width: 1400px; margin: 20px auto 0; padding: 0 20px; }
        .search-input {
            width: 100%;
            padding: 14px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 60px;
            color: white;
            font-size: 16px;
        }
        .categories {
            max-width: 1400px;
            margin: 20px auto 0;
            padding: 0 20px;
            display: flex;
            gap: 12px;
            overflow-x: auto;
        }
        .chip {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }
        .chip.active {
            background: var(--accent);
            color: #0a0c15;
        }
        .products-grid {
            max-width: 1400px;
            margin: 32px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
        }
        .product-card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .product-card:hover { transform: translateY(-6px); border-color: var(--accent); }
        .product-preview {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 20px;
            background: #0c0f18;
            margin-bottom: 16px;
        }
        .product-name { font-size: 20px; font-weight: 700; margin: 8px 0 4px; }
        .current-price { color: var(--accent); font-weight: 800; font-size: 22px; }
        .old-price { text-decoration: line-through; color: #8e8e9e; font-size: 14px; margin-left: 8px; }
        .add-btn {
            background: rgba(255,122,47,0.12);
            border: 1px solid rgba(255,122,47,0.4);
            color: var(--accent);
            padding: 10px 0;
            border-radius: 60px;
            width: 100%;
            font-weight: 600;
            margin-top: 16px;
            cursor: pointer;
        }
        .page { display: none; }
        .page.active { display: block; }
        .cart-container { max-width: 900px; margin: 0 auto; padding: 24px 20px; }
        .cart-item {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total-block { font-size: 28px; font-weight: 800; margin: 24px 0; text-align: right; }
        .checkout-btn {
            background: linear-gradient(105deg, var(--accent), #c2410c);
            border: none;
            padding: 16px 24px;
            border-radius: 60px;
            font-weight: 700;
            width: 100%;
            color: white;
            cursor: pointer;
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #11141f;
            max-width: 650px;
            width: 100%;
            border-radius: 48px;
            padding: 24px;
            border: 1px solid rgba(255,122,47,0.5);
        }
        .gallery {
            display: flex;
            overflow-x: auto;
            gap: 16px;
            border-radius: 28px;
            margin-bottom: 16px;
        }
        .gallery-img {
            flex: 0 0 100%;
            max-height: 55vh;
            object-fit: contain;
            border-radius: 24px;
        }
        .admin-panel {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0c15;
            z-index: 1100;
            overflow-y: auto;
            padding: 24px;
            display: none;
        }
        .admin-panel.active { display: block; }
        .admin-tabs {
            display: flex;
            gap: 8px;
            background: #131724;
            padding: 6px;
            border-radius: 60px;
            width: fit-content;
            margin-bottom: 24px;
        }
        .admin-tab {
            padding: 8px 24px;
            border-radius: 40px;
            background: transparent;
            color: #aaa;
            font-weight: 600;
            cursor: pointer;
        }
        .admin-tab.active {
            background: var(--accent);
            color: #0a0c15;
        }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .btn-icon {
            background: rgba(255,255,255,0.05);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .btn-danger { background: rgba(231,76,60,0.2); color: #ff8a7a; }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1f2a;
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 14px;
            opacity: 0;
            transition: 0.2s;
            z-index: 1200;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(7,9,15,0.92);
            backdrop-filter: blur(16px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 20px;
            border-top: 1px solid rgba(255,122,47,0.2);
        }
        .nav-item {
            background: none;
            border: none;
            color: #8e8e9e;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .nav-item.active { color: var(--accent); }
        .back-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 40px;
            margin-bottom: 20px;
            color: white;
            cursor: pointer;
        }
        .image-upload-area {
            background: #0c0f18;
            border: 2px dashed var(--border);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 16px;
        }
        .image-preview-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }
        .image-preview-item {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .image-preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .remove-image-btn {
            position: absolute;
            top: 4px; right: 4px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            border-radius: 20px;
            width: 20px; height: 20px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div class="logo" id="logoClick">
            <span id="logoContainer"></span>
        </div>
        <button class="cart-btn" onclick="navigateTo('cart')">
            🛒 <span id="cartCount">0</span>
        </button>
    </div>
</div>

<div id="pageHome" class="page active">
    <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="Поиск..." oninput="filterProducts()">
    </div>
    <div class="categories" id="categoriesList"></div>
    <div id="productsGridContainer" class="products-grid"></div>
</div>

<div id="pageCart" class="page">
    <div class="cart-container">
        <button class="back-btn" onclick="navigateTo('home')">← Назад</button>
        <h2>🛒 Корзина</h2>
        <div id="cartItems"></div>
        <div id="cartTotal"></div>
        <div id="checkoutForm" style="display:none;">
            <div class="form-card" style="background:#131724; border-radius:32px; padding:24px; margin-top:20px;">
                <input type="text" id="customerName" placeholder="Ваше имя" style="width:100%; padding:14px; background:#0c0f18; border-radius:28px; border:1px solid var(--border); color:white; margin-bottom:12px;">
                <input type="email" id="customerEmail" placeholder="Email" style="width:100%; padding:14px; background:#0c0f18; border-radius:28px; border:1px solid var(--border); color:white; margin-bottom:12px;">
                <button class="checkout-btn" onclick="processOrder()">✅ Подтвердить заказ</button>
            </div>
        </div>
    </div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <button class="modal-close" style="position:absolute; top:20px; right:20px; background:rgba(0,0,0,0.6); border:none; border-radius:60px; width:36px; height:36px; color:white; font-size:20px; cursor:pointer;" onclick="closeModal()">✖</button>
        <div class="gallery" id="modalGallery"></div>
        <div class="gallery-nav" id="galleryNav" style="display:flex; justify-content:center; gap:8px; margin:12px 0;"></div>
        <h2 id="modalName"></h2>
        <div id="modalCategory" style="color:#aaa;"></div>
        <div id="modalPrice" style="margin:12px 0;"></div>
        <p id="modalDesc"></p>
        <button id="modalAddBtn" class="add-btn" style="margin-top:20px;">➕ В корзину</button>
    </div>
</div>

<!-- Админ-панель (открывается 5 кликами по логотипу) -->
<div id="adminPanel" class="admin-panel">
    <div class="admin-header" style="display:flex; justify-content:space-between; margin-bottom:28px;">
        <h2>🔧 Админ-панель</h2>
        <button class="btn-icon btn-danger" onclick="closeAdminPanel()">✖ Закрыть</button>
    </div>
    <div class="admin-tabs">
        <button class="admin-tab active" data-tab="categoriesTab">📁 Категории</button>
        <button class="admin-tab" data-tab="productsTab">📦 Товары</button>
        <button class="admin-tab" data-tab="settingsTab">⚙️ Настройки</button>
    </div>
    <div id="categoriesTab" class="admin-section active">
        <div style="display:flex; gap:24px; flex-wrap:wrap;">
            <div style="background:#131724; border-radius:32px; padding:20px; width:280px;">
                <h3>📁 Категории</h3>
                <div id="adminCategoryList"></div>
                <div style="display:flex; gap:8px; margin-top:20px;">
                    <input type="text" id="newAdminCatName" placeholder="Новая категория" style="flex:1; background:#0c0f18; border-radius:40px; padding:10px; border:1px solid var(--border); color:white;">
                    <button class="btn-icon" style="background:var(--accent); color:#0a0c15;" onclick="addCategoryFromAdmin()">➕</button>
                </div>
            </div>
            <div style="flex:1; background:#131724; border-radius:32px; padding:20px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <h3 id="currentCategoryTitle">📦 Товары в категории</h3>
                    <button class="btn-icon" style="background:var(--accent); color:#0a0c15;" onclick="addProductInCurrentCategory()">➕ Новый товар</button>
                </div>
                <div id="adminProductsByCategory"></div>
            </div>
        </div>
    </div>
    <div id="productsTab" class="admin-section">
        <button class="btn-icon" style="background:var(--accent); color:#0a0c15; margin-bottom:20px;" onclick="addGlobalProduct()">➕ Добавить товар</button>
        <div id="allProductsList"></div>
    </div>
    <div id="settingsTab" class="admin-section">
        <div style="background:#131724; border-radius:32px; padding:24px; max-width:600px;">
            <h3>⚙️ Настройки</h3>
            <div style="margin:20px 0;"><input type="text" id="settingsStoreName" placeholder="Название магазина" style="width:100%; padding:14px; background:#0c0f18; border-radius:28px; border:1px solid var(--border); color:white;"></div>
            <div style="margin:20px 0;"><input type="text" id="settingsLogoText" placeholder="Текстовый логотип" style="width:100%; padding:14px; background:#0c0f18; border-radius:28px; border:1px solid var(--border); color:white;"></div>
            <div>
                <div id="logoUploadArea" style="background:#0c0f18; border:2px dashed var(--border); border-radius:28px; padding:20px; text-align:center; cursor:pointer;" onclick="document.getElementById('logoFileInput').click()">
                    📸 Загрузить логотип
                    <input type="file" id="logoFileInput" accept="image/*" style="display:none" onchange="handleLogoUpload(event)">
                </div>
                <div id="logoPreviewContainer" style="margin-top:16px;"></div>
                <button class="btn-icon btn-danger" onclick="removeLogo()" style="margin-top:8px;">🗑️ Удалить логотип</button>
            </div>
            <button class="checkout-btn" onclick="saveSettings()" style="margin-top:20px;">💾 Сохранить</button>
        </div>
    </div>
</div>

<div id="editProductModal" class="modal">
    <div class="modal-content" style="max-width:650px;">
        <button class="modal-close" style="position:absolute; top:20px; right:20px; background:rgba(0,0,0,0.6); border:none; border-radius:60px; width:36px; height:36px; color:white; font-size:20px; cursor:pointer;" onclick="closeEditProductModal()">✖</button>
        <h3>✏️ Редактировать товар</h3>
        <input type="hidden" id="editProductId">
        <div style="margin:12px 0;"><input type="text" id="editName" placeholder="Название" style="width:100%; padding:14px; background:#0c0f18; border-radius:28px; border:1px solid var(--border); color:white;"></div>
        <div style="margin:12px 0;"><select id="editCategoryId" style="width:100%; padding:14px; background:#0c0f18; border-radius:28px; border:1px solid var(--border); color:white;"></select></div>
        <div style="margin:12px 0;"><input type="number" id="editPrice" placeholder="Цена" style="width:100%; padding:14px; background:#0c0f18; border-radius:28px; border:1px solid var(--border); color:white;"></div>
        <div style="margin:12px 0;"><input type="number" id="editOldPrice" placeholder="Старая цена" style="width:100%; padding:14px; background:#0c0f18; border-radius:28px; border:1px solid var(--border); color:white;"></div>
        <div style="margin:12px 0;"><input type="text" id="editFileUrl" placeholder="Ссылка на файл" style="width:100%; padding:14px; background:#0c0f18; border-radius:28px; border:1px solid var(--border); color:white;"></div>
        <div style="margin:12px 0;"><input type="text" id="editYoutubeUrl" placeholder="YouTube ссылка" style="width:100%; padding:14px; background:#0c0f18; border-radius:28px; border:1px solid var(--border); color:white;"></div>
        <label>Изображения</label>
        <div id="imageUploadArea" class="image-upload-area" onclick="document.getElementById('imageFileInput').click()">
            📸 Загрузить изображения
            <input type="file" id="imageFileInput" multiple accept="image/*" style="display:none" onchange="handleImageFiles(event)">
        </div>
        <div id="imagePreviewList" class="image-preview-list"></div>
        <div style="margin:12px 0;"><textarea id="editDesc" rows="3" placeholder="Описание" style="width:100%; padding:14px; background:#0c0f18; border-radius:28px; border:1px solid var(--border); color:white;"></textarea></div>
        <button class="checkout-btn" onclick="saveProductChanges()">💾 Сохранить</button>
    </div>
</div>

<div class="toast" id="toastMsg">Сообщение</div>
<div class="bottom-nav">
    <button class="nav-item active" onclick="navigateTo('home')">🏠 Каталог</button>
    <button class="nav-item" onclick="navigateTo('cart')">🛒 Корзина</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCg0EUX3grKMXmKoLKZyGcWSAYPDZ-bwuQ",
        authDomain: "blendmanshop.firebaseapp.com",
        projectId: "blendmanshop",
        storageBucket: "blendmanshop.firebasestorage.app",
        messagingSenderId: "32462864879",
        appId: "1:32462864879:web:958c2f23c98859db9a761a",
        measurementId: "G-HWLL4RRPDP"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // Telegram
    let tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    // ВАШ TELEGRAM ID (замените!)
    const ADMIN_TELEGRAM_ID = 123456789; // 👈 СЮДА ВСТАВЬТЕ СВОЙ ID

    function isAdmin() {
        if (!tg) return false;
        return tg.initDataUnsafe?.user?.id === ADMIN_TELEGRAM_ID;
    }

    let products = [];
    let categories = [];
    let cart = JSON.parse(localStorage.getItem('blender_cart')) || [];
    let currentAdminCategoryId = null;
    let selectedImageFiles = [];

    let settings = { storeName: "Blender Shop", logoText: "🌀 BLENDER SHOP", logoImage: null };

    // Загрузка данных
    async function loadCategories() {
        const snap = await getDocs(collection(db, "categories"));
        categories = [];
        snap.forEach(d => categories.push({ id: d.id, ...d.data() }));
        if (categories.length === 0) {
            const def = [{ id: "cat1", name: "Add-on" }, { id: "cat2", name: "Скрипты" }, { id: "cat4", name: "Бандлы" }, { id: "cat5", name: "Материалы" }];
            for (let c of def) { await setDoc(doc(db, "categories", c.id), c); categories.push(c); }
        }
        renderCategories();
    }
    async function loadProducts() {
        const snap = await getDocs(collection(db, "products"));
        products = [];
        snap.forEach(d => products.push({ id: parseInt(d.id), ...d.data() }));
        renderProducts();
        updateCartBadge();
    }
    async function loadSettings() {
        const snap = await getDocs(collection(db, "settings"));
        if (!snap.empty) snap.forEach(d => settings = { ...settings, ...d.data() });
        else await setDoc(doc(db, "settings", "main"), settings);
        document.title = settings.storeName;
        document.getElementById('settingsStoreName').value = settings.storeName;
        document.getElementById('settingsLogoText').value = settings.logoText;
        updateLogoDisplay();
    }

    function updateLogoDisplay() {
        const container = document.getElementById('logoContainer');
        container.innerHTML = '';
        if (settings.logoImage) {
            const img = document.createElement('img');
            img.src = settings.logoImage;
            img.className = 'logo-img';
            container.appendChild(img);
        }
        const span = document.createElement('span');
        span.className = 'logo-text';
        span.innerText = settings.logoText;
        container.appendChild(span);
        const preview = document.getElementById('logoPreviewContainer');
        if (preview) preview.innerHTML = settings.logoImage ? `<img src="${settings.logoImage}" style="height:60px;">` : '<span>Нет логотипа</span>';
    }

    function renderCategories() {
        const container = document.getElementById('categoriesList');
        let cur = window.currentCategoryId || null;
        container.innerHTML = `<div class="chip ${cur===null?'active':''}" data-cat="">🔥 Все</div>` + categories.map(c => `<div class="chip ${cur===c.id?'active':''}" data-cat="${c.id}">${c.name}</div>`).join('');
        document.querySelectorAll('.chip').forEach(ch => ch.addEventListener('click', () => {
            window.currentCategoryId = ch.dataset.cat === "" ? null : ch.dataset.cat;
            renderCategories();
            renderProducts();
        }));
    }
    window.currentCategoryId = null;
    window.searchQuery = "";
    function filterProducts() { window.searchQuery = document.getElementById('searchInput').value.toLowerCase(); renderProducts(); }
    function renderProducts() {
        let filtered = products.filter(p => (!window.currentCategoryId || p.categoryId === window.currentCategoryId) && (!window.searchQuery || p.name.toLowerCase().includes(window.searchQuery)));
        const grid = document.getElementById('productsGridContainer');
        if (!filtered.length) { grid.innerHTML = '<div style="text-align:center;padding:40px;">✨ Ничего не найдено</div>'; return; }
        grid.innerHTML = filtered.map(p => `
            <div class="product-card" onclick="openProductModal(${p.id})">
                <img class="product-preview" src="${p.images?.[0] || 'https://placehold.co/1024x1024/2b2b3a/white?text=No+Image'}" loading="lazy">
                <div class="product-name">${escapeHtml(p.name)}</div>
                <div><span class="current-price">${formatPrice(p.price)}</span>${p.oldPrice ? `<span class="old-price">${formatPrice(p.oldPrice)}</span>` : ''}</div>
                <button class="add-btn" onclick="event.stopPropagation(); toggleCart(${p.id})">${cart.some(i=>i.id===p.id) ? '✓ В корзине' : '+ В корзину'}</button>
            </div>
        `).join('');
    }
    function formatPrice(p) { return p === 0 ? "Бесплатно" : p.toLocaleString() + " ₽"; }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function updateCartBadge() { document.getElementById('cartCount').innerText = cart.length; }
    function showToast(msg) { let t = document.getElementById('toastMsg'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

    function toggleCart(id) {
        let idx = cart.findIndex(i=>i.id===id);
        if (idx !== -1) cart.splice(idx,1);
        else { let p = products.find(p=>p.id===id); cart.push({ id: p.id, name: p.name, price: p.price, fileUrl: p.fileUrl, preview: p.images?.[0] || '' }); }
        localStorage.setItem('blender_cart', JSON.stringify(cart));
        renderProducts();
        renderCart();
        showToast(idx===-1 ? "Добавлено" : "Удалено");
        updateCartBadge();
    }
    function renderCart() {
        const container = document.getElementById('cartItems');
        if (!cart.length) { container.innerHTML = '<div style="text-align:center;padding:40px;">Корзина пуста</div>'; document.getElementById('cartTotal').innerHTML = ''; document.getElementById('checkoutForm').style.display = 'none'; return; }
        container.innerHTML = cart.map(item => `<div class="cart-item"><div><img class="cart-preview" style="width:48px;height:48px;object-fit:cover;border-radius:12px;margin-right:12px;" src="${item.preview}"> ${item.name} - ${formatPrice(item.price)}</div><button class="remove-item" style="background:rgba(231,76,60,0.2); border:none; color:#ff6b5e; padding:8px 18px; border-radius:40px;" onclick="removeFromCart(${item.id})">Удалить</button></div>`).join('');
        let total = cart.reduce((s,i)=>s+i.price,0);
        document.getElementById('cartTotal').innerHTML = `<div class="total-block">Итого: ${formatPrice(total)}</div>`;
        document.getElementById('checkoutForm').style.display = 'block';
    }
    window.removeFromCart = function(id) { cart = cart.filter(i=>i.id!==id); localStorage.setItem('blender_cart', JSON.stringify(cart)); renderCart(); renderProducts(); updateCartBadge(); };
    window.processOrder = function() {
        let name = document.getElementById('customerName').value.trim(), email = document.getElementById('customerEmail').value.trim();
        if (!name || !email) { showToast("Заполните имя и email"); return; }
        if (!cart.length) return;
        let links = cart.map(item => ({ name: item.name, url: products.find(p=>p.id===item.id)?.fileUrl || item.fileUrl })).filter(l=>l.url);
        let html = `<div><h3>✅ Спасибо, ${name}!</h3><p>Ваши файлы:</p>` + links.map(l=>`<a href="${l.url}" target="_blank" style="display:inline-block; background:#ff7a2f; margin:8px; padding:8px 16px; border-radius:40px; color:#0a0c15; text-decoration:none;">📥 ${l.name}</a>`).join('') + `<br><button class="checkout-btn" onclick="location.reload()">Закрыть</button></div>`;
        document.getElementById('cartItems').innerHTML = html;
        document.getElementById('cartTotal').innerHTML = '';
        document.getElementById('checkoutForm').style.display = 'none';
        cart = []; localStorage.setItem('blender_cart', JSON.stringify(cart)); updateCartBadge();
        if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    };
    window.navigateTo = function(page) {
        document.getElementById('pageHome').classList.toggle('active', page==='home');
        document.getElementById('pageCart').classList.toggle('active', page==='cart');
        document.querySelectorAll('.nav-item').forEach((btn,i)=>btn.classList.toggle('active', (page==='home' && i===0) || (page==='cart' && i===1)));
        if (page==='cart') renderCart();
        closeModal();
    };

    // Модалка товара
    let currentModalProduct = null, currentImageIndex = 0;
    window.openProductModal = function(id) {
        let p = products.find(x=>x.id===id);
        if (!p) return;
        currentModalProduct = p;
        currentImageIndex = 0;
        let images = p.images?.length ? p.images : ['https://placehold.co/1024x1024/2b2b3a/white?text=No+Image'];
        document.getElementById('modalGallery').innerHTML = images.map((img,i)=>`<img class="gallery-img" src="${img}" style="display:${i===0?'block':'none'};">`).join('');
        document.getElementById('galleryNav').innerHTML = images.map((_,idx)=>`<div class="gallery-dot" style="width:8px;height:8px;background:${idx===0?'#ff7a2f':'#4a4a5a'};border-radius:10px;cursor:pointer;margin:0 4px;" data-dot="${idx}"></div>`).join('');
        document.querySelectorAll('.gallery-dot').forEach(dot=>dot.addEventListener('click',(e)=>{ currentImageIndex = parseInt(e.target.dataset.dot); updateGallery(); }));
        function updateGallery() {
            document.querySelectorAll('#modalGallery .gallery-img').forEach((img,i)=>img.style.display = i===currentImageIndex ? 'block' : 'none');
            document.querySelectorAll('#galleryNav .gallery-dot').forEach((d,i)=>d.style.background = i===currentImageIndex ? '#ff7a2f' : '#4a4a5a');
        }
        document.getElementById('modalName').innerText = p.name;
        document.getElementById('modalCategory').innerHTML = categories.find(c=>c.id===p.categoryId)?.name || "Без категории";
        document.getElementById('modalPrice').innerHTML = `<span class="current-price">${formatPrice(p.price)}</span>${p.oldPrice ? `<span class="old-price">${formatPrice(p.oldPrice)}</span>` : ''}`;
        document.getElementById('modalDesc').innerText = p.description || "";
        let yt = document.getElementById('youtubeLink');
        if (p.youtubeUrl) { yt.href = p.youtubeUrl; yt.style.display = 'inline-flex'; } else yt.style.display = 'none';
        document.getElementById('modalAddBtn').innerText = cart.some(i=>i.id===p.id) ? "✓ В корзине" : "➕ В корзину";
        document.getElementById('productModal').classList.add('active');
    };
    window.closeModal = function() { document.getElementById('productModal').classList.remove('active'); };
    document.getElementById('modalAddBtn').onclick = () => { if (currentModalProduct && !cart.some(i=>i.id===currentModalProduct.id)) toggleCart(currentModalProduct.id); closeModal(); };

    // Админ-панель (все функции)
    function renderAdminCategoriesSidebar() {
        const container = document.getElementById('adminCategoryList');
        container.innerHTML = categories.map(cat => `<div class="category-folder ${currentAdminCategoryId===cat.id?'active':''}" data-catid="${cat.id}" style="background:rgba(255,255,255,0.03); border-radius:20px; padding:12px 16px; margin-bottom:10px; display:flex; justify-content:space-between; cursor:pointer;"><span>📂 ${cat.name}</span><button class="delete-cat-btn" data-catid="${cat.id}" style="background:none; border:none; color:#ff8a7a; cursor:pointer;">🗑️</button></div>`).join('');
        document.querySelectorAll('.category-folder').forEach(el => {
            el.addEventListener('click', (e) => { if(e.target.classList.contains('delete-cat-btn')) return; currentAdminCategoryId = el.dataset.catid; renderAdminCategoriesSidebar(); renderProductsByCategory(); document.getElementById('currentCategoryTitle').innerHTML = `📦 Товары в категории: ${categories.find(c=>c.id===currentAdminCategoryId)?.name || '?'}`; });
            const del = el.querySelector('.delete-cat-btn');
            if(del) del.addEventListener('click', (e) => { e.stopPropagation(); deleteCategoryById(el.dataset.catid); });
        });
    }
    async function deleteCategoryById(catId) { if(!isAdmin()) return; if(!confirm("Удалить категорию и все товары?")) return; const q = query(collection(db,"products"), where("categoryId","==",catId)); const snap = await getDocs(q); for(let d of snap.docs) await deleteDoc(doc(db,"products",d.id)); await deleteDoc(doc(db,"categories",catId)); await loadCategories(); await loadProducts(); if(currentAdminCategoryId===catId) currentAdminCategoryId = categories[0]?.id || null; renderAdminCategoriesSidebar(); renderProductsByCategory(); renderAllProductsList(); showToast("Категория удалена"); }
    window.addCategoryFromAdmin = async function() { if(!isAdmin()) return; let name = document.getElementById('newAdminCatName').value.trim(); if(!name) return; let newId = "cat_"+Date.now(); await setDoc(doc(db,"categories",newId), { name }); await loadCategories(); renderAdminCategoriesSidebar(); renderAllProductsList(); document.getElementById('newAdminCatName').value = ''; showToast(`Категория "${name}" добавлена`); };
    function renderProductsByCategory() {
        const container = document.getElementById('adminProductsByCategory');
        if(!currentAdminCategoryId) { container.innerHTML = '<div style="padding:20px;">Выберите категорию</div>'; return; }
        let filtered = products.filter(p=>p.categoryId === currentAdminCategoryId);
        if(!filtered.length) { container.innerHTML = '<div style="padding:20px;">Нет товаров</div>'; return; }
        container.innerHTML = filtered.map(p => `<div class="product-admin-row" style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.02); border-radius:24px; padding:12px 16px; margin-bottom:12px;"><div class="product-admin-info" style="display:flex; align-items:center; gap:12px; cursor:pointer;" onclick="openEditProductModal(${p.id})"><img class="admin-preview" src="${p.images?.[0] || 'https://placehold.co/1024x1024/2b2b3a/white?text=No+Image'}" style="width:48px;height:48px;object-fit:cover;border-radius:12px;"><div><strong>${escapeHtml(p.name)}</strong><br><span>${formatPrice(p.price)}</span></div></div><div><button class="btn-icon" onclick="event.stopPropagation(); openEditProductModal(${p.id})">✏️ Ред.</button><button class="btn-icon btn-danger" onclick="event.stopPropagation(); deleteProductById(${p.id})">🗑️</button></div></div>`).join('');
    }
    function renderAllProductsList() {
        const container = document.getElementById('allProductsList');
        if(!products.length) { container.innerHTML = '<div style="padding:20px;">Нет товаров</div>'; return; }
        container.innerHTML = products.map(p => `<div class="product-admin-row" style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.02); border-radius:24px; padding:12px 16px; margin-bottom:12px;"><div class="product-admin-info" style="display:flex; align-items:center; gap:12px; cursor:pointer;" onclick="openEditProductModal(${p.id})"><img class="admin-preview" src="${p.images?.[0] || 'https://placehold.co/1024x1024/2b2b3a/white?text=No+Image'}" style="width:48px;height:48px;object-fit:cover;border-radius:12px;"><div><strong>${escapeHtml(p.name)}</strong><br><span>${categories.find(c=>c.id===p.categoryId)?.name || 'Без категории'} | ${formatPrice(p.price)}</span></div></div><div><button class="btn-icon" onclick="event.stopPropagation(); openEditProductModal(${p.id})">✏️ Ред.</button><button class="btn-icon btn-danger" onclick="event.stopPropagation(); deleteProductById(${p.id})">🗑️</button></div></div>`).join('');
    }
    window.addProductInCurrentCategory = async function() { if(!isAdmin()) return; if(!currentAdminCategoryId) { showToast("Выберите категорию"); return; } let newId = Date.now(); let newProd = { id: newId, name: "Новый ассет", categoryId: currentAdminCategoryId, price: 0, oldPrice: null, fileUrl: "", youtubeUrl: "", images: [], description: "" }; await setDoc(doc(db,"products",String(newId)), newProd); await loadProducts(); renderProductsByCategory(); renderAllProductsList(); openEditProductModal(newId); };
    window.addGlobalProduct = async function() { if(!isAdmin()) return; let newId = Date.now(); let newProd = { id: newId, name: "Новый ассет", categoryId: categories[0]?.id || null, price: 0, oldPrice: null, fileUrl: "", youtubeUrl: "", images: [], description: "" }; await setDoc(doc(db,"products",String(newId)), newProd); await loadProducts(); renderAllProductsList(); renderProductsByCategory(); openEditProductModal(newId); };
    window.deleteProductById = async function(id) { if(!isAdmin()) return; if(!confirm("Удалить товар?")) return; let prod = products.find(p=>p.id===id); if(prod?.images) for(let img of prod.images) if(img.includes('firebasestorage')) try { await deleteObject(ref(storage, img)); } catch(e){} await deleteDoc(doc(db,"products",String(id))); await loadProducts(); renderProductsByCategory(); renderAllProductsList(); showToast("Товар удалён"); };
    async function uploadImagesToStorage(files, productId) { let urls = []; for(let file of files) { let refFile = ref(storage, `products/${productId}/${Date.now()}_${file.name}`); await uploadBytes(refFile, file); urls.push(await getDownloadURL(refFile)); } return urls; }
    function handleImageFiles(event) { let files = Array.from(event.target.files); for(let file of files) { if(!file.type.startsWith('image/')) continue; selectedImageFiles.push(file); let reader = new FileReader(); reader.onload = function(e) { let div = document.createElement('div'); div.className = 'image-preview-item'; div.innerHTML = `<img src="${e.target.result}"><button class="remove-image-btn" data-filename="${file.name}">✖</button>`; document.getElementById('imagePreviewList').appendChild(div); div.querySelector('.remove-image-btn').addEventListener('click', () => { let idx = selectedImageFiles.findIndex(f=>f.name===file.name); if(idx!==-1) selectedImageFiles.splice(idx,1); div.remove(); }); }; reader.readAsDataURL(file); } document.getElementById('imageFileInput').value = ''; }
    window.openEditProductModal = async function(id) { if(!isAdmin()) return; let prod = products.find(p=>p.id===id); if(!prod) return; selectedImageFiles = []; document.getElementById('imagePreviewList').innerHTML = ''; if(prod.images) for(let imgUrl of prod.images) { let div = document.createElement('div'); div.className = 'image-preview-item'; div.innerHTML = `<img src="${imgUrl}"><button class="remove-image-btn" data-url="${imgUrl}">✖</button>`; document.getElementById('imagePreviewList').appendChild(div); div.querySelector('.remove-image-btn').addEventListener('click', async () => { if(imgUrl.includes('firebasestorage')) try { await deleteObject(ref(storage, imgUrl)); } catch(e){} prod.images = prod.images.filter(u=>u!==imgUrl); await setDoc(doc(db,"products",String(id)), prod); await loadProducts(); div.remove(); showToast("Изображение удалено"); }); } document.getElementById('editProductId').value = id; document.getElementById('editName').value = prod.name; let catSelect = document.getElementById('editCategoryId'); catSelect.innerHTML = `<option value="">— Без категории —</option>` + categories.map(c=>`<option value="${c.id}" ${prod.categoryId===c.id?'selected':''}>${c.name}</option>`).join(''); document.getElementById('editPrice').value = prod.price; document.getElementById('editOldPrice').value = prod.oldPrice || ''; document.getElementById('editFileUrl').value = prod.fileUrl || ''; document.getElementById('editYoutubeUrl').value = prod.youtubeUrl || ''; document.getElementById('editDesc').value = prod.description || ''; document.getElementById('editProductModal').classList.add('active'); };
    window.closeEditProductModal = function() { document.getElementById('editProductModal').classList.remove('active'); selectedImageFiles = []; };
    window.saveProductChanges = async function() { if(!isAdmin()) return; let id = parseInt(document.getElementById('editProductId').value); let prod = products.find(p=>p.id===id); if(!prod) return; prod.name = document.getElementById('editName').value; prod.categoryId = document.getElementById('editCategoryId').value || null; prod.price = parseInt(document.getElementById('editPrice').value) || 0; prod.oldPrice = document.getElementById('editOldPrice').value ? parseInt(document.getElementById('editOldPrice').value) : null; prod.fileUrl = document.getElementById('editFileUrl').value; prod.youtubeUrl = document.getElementById('editYoutubeUrl').value; prod.description = document.getElementById('editDesc').value; if(selectedImageFiles.length) { let newUrls = await uploadImagesToStorage(selectedImageFiles, id); prod.images = [...(prod.images || []), ...newUrls]; } await setDoc(doc(db,"products",String(id)), prod); await loadProducts(); renderProductsByCategory(); renderAllProductsList(); showToast("Товар сохранён"); closeEditProductModal(); };
    async function saveSettings() { if(!isAdmin()) return; settings.storeName = document.getElementById('settingsStoreName').value.trim(); settings.logoText = document.getElementById('settingsLogoText').value.trim(); await setDoc(doc(db,"settings","main"), settings); document.title = settings.storeName; updateLogoDisplay(); showToast("Настройки сохранены"); }
    function handleLogoUpload(event) { if(!isAdmin()) return; let file = event.target.files[0]; if(!file || !file.type.startsWith('image/')) return; let reader = new FileReader(); reader.onload = async function(e) { let storageRef = ref(storage, `logo/logo_${Date.now()}`); let blob = await fetch(e.target.result).then(r=>r.blob()); await uploadBytes(storageRef, blob); let url = await getDownloadURL(storageRef); settings.logoImage = url; await setDoc(doc(db,"settings","main"), settings); updateLogoDisplay(); showToast("Логотип загружен"); }; reader.readAsDataURL(file); document.getElementById('logoFileInput').value = ''; }
    async function removeLogo() { if(!isAdmin()) return; if(settings.logoImage && settings.logoImage.includes('firebasestorage')) try { await deleteObject(ref(storage, settings.logoImage)); } catch(e){} settings.logoImage = null; await setDoc(doc(db,"settings","main"), settings); updateLogoDisplay(); showToast("Логотип удалён"); }

    function showAdminPanel() {
        if(!isAdmin()) { showToast("⛔ Доступ запрещён. Вы не администратор."); return; }
        currentAdminCategoryId = categories[0]?.id || null;
        renderAdminCategoriesSidebar();
        renderProductsByCategory();
        renderAllProductsList();
        document.getElementById('currentCategoryTitle').innerHTML = currentAdminCategoryId ? `📦 Товары в категории: ${categories.find(c=>c.id===currentAdminCategoryId)?.name || ''}` : '📦 Товары в категории';
        document.getElementById('adminPanel').classList.add('active');
        document.querySelectorAll('.admin-tab').forEach(tab => tab.addEventListener('click', () => { document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); document.querySelectorAll('.admin-section').forEach(sec=>sec.classList.remove('active')); document.getElementById(tab.dataset.tab).classList.add('active'); }));
        document.querySelector('.admin-tab').click();
    }
    window.closeAdminPanel = function() { document.getElementById('adminPanel').classList.remove('active'); };

    let clickCount = 0, clickTimer;
    document.getElementById('logoClick').addEventListener('click', () => {
        clickCount++;
        clearTimeout(clickTimer);
        clickTimer = setTimeout(() => clickCount = 0, 800);
        if (clickCount >= 5) { clickCount = 0; showAdminPanel(); }
    });

    // Drag & drop для логотипа
    let logoArea = document.getElementById('logoUploadArea');
    if(logoArea) {
        logoArea.addEventListener('dragover', e=>{ e.preventDefault(); logoArea.style.borderColor='#ff7a2f'; });
        logoArea.addEventListener('dragleave', ()=> logoArea.style.borderColor='var(--border-light)');
        logoArea.addEventListener('drop', async e=>{ e.preventDefault(); logoArea.style.borderColor='var(--border-light)'; let file = e.dataTransfer.files[0]; if(file && file.type.startsWith('image/')) { let reader = new FileReader(); reader.onload = async function(ev) { let storageRef = ref(storage, `logo/logo_${Date.now()}`); let blob = await fetch(ev.target.result).then(r=>r.blob()); await uploadBytes(storageRef, blob); let url = await getDownloadURL(storageRef); settings.logoImage = url; await setDoc(doc(db,"settings","main"), settings); updateLogoDisplay(); showToast("Логотип загружен"); }; reader.readAsDataURL(file); } });
    }

    async function init() {
        await loadSettings();
        await loadCategories();
        await loadProducts();
        renderCart();
        if(tg?.BackButton) { tg.BackButton.onClick(() => { if(document.getElementById('pageHome').classList.contains('active')) tg.close(); else navigateTo('home'); }); tg.BackButton.hide(); }
    }
    init();

    window.filterProducts = filterProducts;
    window.toggleCart = toggleCart;
    window.handleImageFiles = handleImageFiles;
    window.handleLogoUpload = handleLogoUpload;
    window.removeLogo = removeLogo;
    window.saveSettings = saveSettings;
</script>
</body>
</html>
